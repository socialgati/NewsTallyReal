<!DOCTYPE html>
<html>
<head>
    <title>Google Sign-In Private Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs (compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            overflow: hidden;
        }
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }
        .chat-header {
            background-color: #4a5568;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
        }
        .messages-container {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 0.5rem;
        }
        .message {
            max-width: 80%;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message-sent {
            background-color: #3b82f6;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .message-received {
            background-color: #e5e7eb;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        .message-author {
            font-weight: bold;
            font-size: 0.8rem;
            color: #4b5563;
        }
        .message-sent .message-author {
            color: #d1d5db;
        }
        .input-container {
            display: flex;
            padding: 1rem;
            border-top: 1px solid #e5e7eb;
        }
        .message-input {
            flex-grow: 1;
            border: 1px solid #d1d5db;
            border-radius: 9999px;
            padding: 0.75rem 1.5rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .message-input:focus {
            border-color: #2563eb;
        }
        .send-button {
            background-color: #2563eb;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            margin-left: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-button:hover {
            background-color: #1d4ed8;
        }
        .google-btn {
            background-color: #4285f4;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .hidden {
            display: none;
        }
        .sign-out-button {
            background-color: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            margin-top: 1.5rem;
            border: none;
            cursor: pointer;
        }
        .user-id-box {
            background-color: #e5e7eb;
            color: #4b5563;
            padding: 0.75rem;
            margin: 1rem 0;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            word-break: break-all;
        }
        .friend-id-input {
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.5rem;
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="auth-section" class="auth-container">
        <h2>Google Sign-In Private Chat App</h2>
        <button id="google-signin-button" class="google-btn">Google से साइन इन करें</button>
    </div>

    <div id="chat-section" class="chat-container hidden">
        <div class="chat-header">
            <span id="chat-header-text">Chat</span>
            <button id="sign-out-button" class="sign-out-button">साइन आउट करें</button>
        </div>
        <div class="p-4">
            <div class="user-id-box">
                आपकी यूनिक ID: <span id="user-id-display"></span>
            </div>
            <input type="text" id="friend-id-input" class="friend-id-input" placeholder="अपने दोस्त की यूनिक ID डालें">
        </div>
        <div id="messages" class="messages-container">
            <!-- Messages will be displayed here -->
        </div>
        <div class="input-container">
            <input type="text" id="message-input" class="message-input" placeholder="एक संदेश लिखें...">
            <button id="send-button" class="send-button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 00.149.337l.426.853a1 1 0 00.916.557h13a1 1 0 00.916-.557l.426-.853a1 1 0 00.149-.337l-7-14z" />
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Firebase config (जो आपने दिया था)
    const firebaseConfig = {
      apiKey: "AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI",
      authDomain: "newstally-df03c.firebaseapp.com",
      databaseURL: "https://newstally-df03c-default-rtdb.firebaseio.com",
      projectId: "newstally-df03c",
      storageBucket: "newstally-df03c.firebasestorage.app",
      messagingSenderId: "506893212961",
      appId: "1:506893212961:web:63882290195da992207260",
      measurementId: "G-54QER193B3"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let currentFriendId = null;

    // UI elements
    const authSection = document.getElementById('auth-section');
    const chatSection = document.getElementById('chat-section');
    const googleSignInButton = document.getElementById('google-signin-button');
    const signOutButton = document.getElementById('sign-out-button');
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const userIdDisplay = document.getElementById('user-id-display');
    const friendIdInput = document.getElementById('friend-id-input');

    // Firebase Authentication State Change
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            authSection.classList.add('hidden');
            chatSection.classList.remove('hidden');
            userIdDisplay.textContent = user.uid;
            
            // Listen for changes in the friend's ID input
            friendIdInput.addEventListener('input', () => {
                currentFriendId = friendIdInput.value.trim();
                // If a friend ID is entered, start listening for that chat
                if (currentFriendId.length > 0) {
                    listenForPrivateMessages();
                } else {
                    messagesContainer.innerHTML = ''; // Clear messages if friend ID is empty
                }
            });

        } else {
            currentUser = null;
            authSection.classList.remove('hidden');
            chatSection.classList.add('hidden');
        }
    });

    // Google Sign-In function
    googleSignInButton.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;
          db.collection('users').doc(user.uid).set({
            name: user.displayName,
            email: user.email,
            photoURL: user.photoURL,
            lastLogin: new Date()
          }).then(() => {
            console.log('User data saved successfully.');
          }).catch((error) => {
            console.error('Error saving user data:', error);
          });
        })
        .catch((error) => {
          console.error('Sign-in error:', error);
        });
    });

    // Sign out function
    signOutButton.addEventListener('click', () => {
      auth.signOut().then(() => {
        console.log('User signed out successfully');
      }).catch((error) => {
        console.error('Sign-out error:', error);
      });
    });

    // Function to listen for private messages
    function listenForPrivateMessages() {
        if (!currentUser || !currentFriendId) return;

        // Create a unique chat room ID from both user IDs
        const chatRoomId = [currentUser.uid, currentFriendId].sort().join('-');
        const chatRef = db.collection('private-chats').doc(chatRoomId).collection('messages');

        chatRef.orderBy('timestamp').onSnapshot(snapshot => {
            messagesContainer.innerHTML = '';
            snapshot.forEach(doc => {
                const message = doc.data();
                displayMessage(message);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, error => {
            console.error("Error getting messages: ", error);
        });
    }

    // UI पर मैसेजेस दिखाएँ
    function displayMessage(message) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        
        const isMyMessage = currentUser && message.userId === currentUser.uid;
        if (isMyMessage) {
            messageDiv.classList.add('message-sent');
        } else {
            messageDiv.classList.add('message-received');
        }

        const authorSpan = document.createElement('span');
        authorSpan.classList.add('message-author');
        authorSpan.textContent = isMyMessage ? 'आप' : `${message.userName || 'Guest'}`;
        
        const contentDiv = document.createElement('div');
        contentDiv.textContent = message.text;

        messageDiv.appendChild(authorSpan);
        messageDiv.appendChild(contentDiv);
        
        messagesContainer.appendChild(messageDiv);
    }

    // मैसेज भेजें
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text === "" || !currentUser || !currentFriendId) {
            return;
        }

        const chatRoomId = [currentUser.uid, currentFriendId].sort().join('-');
        const chatRef = db.collection('private-chats').doc(chatRoomId).collection('messages');

        chatRef.add({
            text: text,
            userId: currentUser.uid,
            userName: currentUser.displayName,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            messageInput.value = '';
        })
        .catch(error => {
            console.error("Error writing document: ", error);
        });
    }

    // Enter key से मैसेज भेजें
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    sendButton.addEventListener('click', sendMessage);

</script>
</body>
</html>
