<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title data-lang-key="shortsTitle">NewsTally Shorts - Viral News Feed</title>
    <meta name="description" content="Watch the latest, bite-sized news updates in a vertical shorts format. Fast, engaging, and mobile-friendly." />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CSS CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Firebase SDKs (compat version) - Included for consistency -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Inline Styles (Mobile-First Shorts Design) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000; /* Pure black background for the shorts experience */
            color: #ffffff;
            overflow: hidden; /* Prevent body scroll */
        }
        
        /* Base colors (mainly for UI elements in dark mode) */
        :root {
            --gradient-start: #1e3a8a;
            --gradient-end: #3b82f6;
            --red-accent: #dc2626;
            --blue-accent: #2563eb;
        }

        /* --- Shorts Container --- */
        #shorts-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* CRITICAL for Shorts-like feel */
            -webkit-overflow-scrolling: touch;
        }

        /* Hide scrollbar for a clean mobile look */
        #shorts-container::-webkit-scrollbar {
            display: none;
        }
        #shorts-container {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* --- Individual Short Card --- */
        .short-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start; /* Snap to the top of each card */
            position: relative;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Align content to the bottom */
            flex-shrink: 0;
            overflow: hidden;
            transition: opacity 0.3s ease; /* For lazy loading fade-in */
        }
        
        /* Loading/Skeleton State */
        .short-card.loading {
            background-color: #1a1a1a;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- Media (Image/Video Placeholder) --- */
        .short-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Optional: slight blur or darkness for M3 expressive depth */
            filter: brightness(0.75); 
        }

        /* --- Content Overlay --- */
        .short-overlay {
            position: relative;
            z-index: 10;
            padding: 2rem 1rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0)); /* Dark gradient at the bottom */
            padding-bottom: 5rem; /* Space for the floating actions */
            transition: all 0.3s ease;
        }
        
        /* --- Action Buttons (Floating on the right) --- */
        .floating-actions {
            position: absolute;
            bottom: 6rem; /* Above the bottom padding */
            right: 1rem;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .action-btn {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.75rem;
            border-radius: 50%;
            transition: background-color 0.2s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        .action-btn:active {
            transform: scale(0.9);
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* --- Fixed Navigation Controls (Up/Down) --- */
        .fixed-nav {
            position: fixed;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            z-index: 30;
            display: none; /* Hidden by default on small screens, only for large tablets/desktop */
            flex-direction: column;
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .fixed-nav {
                display: flex; 
            }
            .short-overlay {
                padding-bottom: 2rem; /* Less padding needed when floating actions are on the side */
            }
        }
        
        /* Header - Minimalist */
        #shorts-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0));
            padding-top: max(1.5rem, env(safe-area-inset-top)); /* Handle notch/safe areas */
        }
        
        /* Load More indicator */
        #loading-indicator {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        
        /* Manual Refresh Button specific styling */
        #manual-refresh-btn {
            transition: transform 0.3s ease, background-color 0.2s ease;
        }
        #refresh-icon.fa-spin {
            animation: fa-spin 1s infinite linear;
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-screen">

        <!-- Fixed Header (Minimal) -->
        <header id="shorts-header" class="px-4 pb-4">
            <div class="flex justify-between items-center text-white">
                <a href="index.html" class="flex items-center space-x-2">
                    <img src="https://pbs.twimg.com/media/GqpcfVqWkAA-NTP?format=jpg&name=small" alt="NewsTally Favicon" class="w-7 h-7 rounded-full border border-white/50">
                    <h1 class="text-xl font-extrabold tracking-tight" data-lang-key="brandName">NewsTally Shorts</h1>
                </a>
                <div class="flex space-x-2 items-center">
                    <!-- Manual Refresh Button -->
                    <button id="manual-refresh-btn" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition" aria-label="Refresh Feed">
                        <i id="refresh-icon" class="fas fa-sync-alt"></i>
                    </button>
                    <!-- Close/Back to main feed -->
                    <a href="index.html" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition" aria-label="Go back to main feed">
                        <i class="fas fa-times text-lg"></i>
                    </a>
                </div>
            </div>
        </header>

        <!-- Shorts Vertical Scroll Container -->
        <div id="shorts-container" class="relative">
            <div id="shorts-feed">
                <!-- Initial loading card -->
                <div class="short-card loading flex justify-center items-center text-white/50" id="initial-loading-card">
                    <i class="fas fa-spinner fa-spin fa-2x mr-2"></i>
                    <span data-lang-key="loading">शॉर्ट्स लोड हो रहे हैं...</span>
                </div>
            </div>
        </div>
        
        <!-- Fixed Vertical Navigation (for non-swiping) -->
        <div class="fixed-nav">
            <button id="nav-up-btn" class="action-btn" aria-label="Previous Short">
                <i class="fas fa-chevron-up"></i>
            </button>
            <button id="nav-down-btn" class="action-btn" aria-label="Next Short">
                <i class="fas fa-chevron-down"></i>
            </button>
        </div>
    </div>

    <script>
        // --- Configuration and Constants ---
        const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
        const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
        const NEWS_SHEET_NAME = 'Sheet1';
        
        let allShorts = [];
        let currentShortIndex = 0;
        let isFetching = false;
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 2000;
        const shortCategories = {
          'Politics': 'bg-red-600', 'Sports': 'bg-yellow-600', 'Technology': 'bg-purple-600', 
          'Entertainment': 'bg-pink-600', 'Cricket': 'bg-teal-600', 'General': 'bg-gray-600'
        };

        const translations = {
            en: {
                brandName: 'NewsTally', shortsTitle: 'NewsTally Shorts', like: 'Like', share: 'Share', source: 'Source',
                noNewsFound: 'No shorts found. Failed to fetch data. Please refresh.', loading: 'Loading shorts...',
            },
            hi: {
                brandName: 'न्यूज़टैली', shortsTitle: 'न्यूज़टैली शॉर्ट्स', like: 'पसंद करें', share: 'शेयर करें', source: 'स्रोत',
                noNewsFound: 'कोई शॉर्ट्स नहीं मिला। डेटा प्राप्त करने में विफल। कृपया रीफ़्रेश करें।', loading: 'शॉर्ट्स लोड हो रहे हैं...',
            }
        };
        
        const savedLanguage = localStorage.getItem('language') || 'hi';
        
        // --- Utility Functions ---
        
        function updateUI(lang) {
            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.getAttribute('data-lang-key');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }
        
        async function fetchWithRetry(url, retries = MAX_RETRIES) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    const data = await response.json();
                    if (!data || !data.values || !Array.isArray(data.values)) throw new Error('Invalid or empty data received from API');
                    return data;
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed for ${url}: ${error.message}`);
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                }
            }
        }
        
        // --- Shorts Rendering and Logic ---

        function renderShortCard(item, index) {
            const categoryClass = shortCategories[item.category] || shortCategories['General'];
            const shortDescription = item.description.split('\n\n')[0] || item.headline;

            return `
                <div id="short-${index}" class="short-card" data-index="${index}">
                    <!-- Media (Image is the background) -->
                    <img src="${item.image}" alt="${item.headline}" class="short-media" loading="lazy"
                         onerror="this.onerror=null;this.src='https://placehold.co/720x1280/1a1a1a/ffffff?text=Image+Missing';">

                    <!-- Content Overlay -->
                    <div class="short-overlay flex flex-col justify-end space-y-2">
                        <!-- Category Badge -->
                        <span class="text-sm font-semibold rounded-full px-3 py-1 self-start ${categoryClass}">
                            ${item.category}
                        </span>
                        
                        <!-- Main Headline/Description -->
                        <h2 class="text-2xl font-bold leading-snug drop-shadow-lg">
                            ${shortDescription}
                        </h2>
                        
                        <!-- Source and Date -->
                        <p class="text-sm text-white/80 font-medium flex items-center space-x-2">
                            <i class="fas fa-clock"></i>
                            <span>${item.source} • ${item.date}</span>
                        </p>
                    </div>

                    <!-- Floating Action Buttons -->
                    <div class="floating-actions md:hidden">
                        <button class="action-btn" aria-label="Like">
                            <i class="fas fa-heart"></i>
                        </button>
                        <button class="action-btn" aria-label="Share">
                            <i class="fas fa-share-alt"></i>
                        </button>
                        <a href="${item.link}" target="_blank" class="action-btn" aria-label="Read Original Source">
                            <i class="fas fa-link"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function renderShortsFeed(scrollToIndex = 0) {
            const feedContainer = document.getElementById('shorts-feed');
            
            if (allShorts.length === 0) {
                 feedContainer.innerHTML = `<div class="short-card flex justify-center items-center text-white/50"><p data-lang-key="noNewsFound">${translations[savedLanguage].noNewsFound}</p></div>`;
                 return;
            }

            let html = allShorts.map((item, index) => renderShortCard(item, index)).join('');
            feedContainer.innerHTML = html;
            updateUI(savedLanguage); 
            
            // Scroll to the specified index if it's within bounds
            if (scrollToIndex >= 0 && scrollToIndex < allShorts.length) {
                 currentShortIndex = scrollToIndex;
                 const targetCard = document.getElementById(`short-${currentShortIndex}`);
                 if (targetCard) {
                     requestAnimationFrame(() => {
                         document.getElementById('shorts-container').scrollTop = targetCard.offsetTop;
                     });
                 }
            } else {
                currentShortIndex = 0;
            }
        }
        
        function handleScroll() {
            const container = document.getElementById('shorts-container');
            const scrollTop = container.scrollTop;
            const viewportHeight = container.clientHeight;
            
            let newIndex = Math.round(scrollTop / viewportHeight);
            
            if (newIndex >= allShorts.length) {
                 newIndex = allShorts.length > 0 ? allShorts.length - 1 : 0;
            }

            if (newIndex !== currentShortIndex) {
                 currentShortIndex = newIndex;
            }
        }
        
        function navigateShorts(direction) {
            const container = document.getElementById('shorts-container');
            
            let nextIndex = currentShortIndex + direction;

            if (nextIndex >= 0 && nextIndex < allShorts.length) {
                currentShortIndex = nextIndex;
                const newCard = document.getElementById(`short-${currentShortIndex}`);
                if(newCard) {
                     container.scrollTo({
                        top: newCard.offsetTop,
                        behavior: 'smooth'
                    });
                }
            }
        }

        // --- Manual Data Initialization and Refresh ---
        
        async function fetchShortsData(isManualRefresh = false) {
            if (isFetching) return;
            
            const refreshBtn = document.getElementById('manual-refresh-btn');
            const refreshIcon = document.getElementById('refresh-icon');

            // Start loading state
            isFetching = true;
            refreshIcon.classList.add('fa-spin');
            refreshBtn.disabled = true;

            // Show loading card only if the feed is empty
            if (allShorts.length === 0) {
                 document.getElementById('shorts-feed').innerHTML = `<div class="short-card loading flex justify-center items-center text-white/50"><i class="fas fa-spinner fa-spin fa-2x mr-2"></i><span data-lang-key="loading">${translations[savedLanguage].loading}</span></div>`;
            }
            
            const scrollIndexToMaintain = isManualRefresh ? currentShortIndex : 0;

            // API Check (for console debugging)
            if (!API_KEY || API_KEY === '') {
                console.error("API Key is missing or empty. Please ensure the API_KEY constant is set correctly.");
            }

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${NEWS_SHEET_NAME}?key=${API_KEY}`;
                const data = await fetchWithRetry(url);
                const rows = data.values;

                if (!rows || rows.length <= 1) throw new Error('No valid news data found in the spreadsheet.');
                
                const newShorts = rows.slice(1).map(row => ({
                    headline: row[1]?.trim() || 'Breaking News Update',
                    source: row[2]?.trim() || 'Unknown Source',
                    date: row[3]?.trim() || new Date().toISOString().split('T')[0],
                    description: row[4]?.trim() || 'No detail available for this short.',
                    link: row[5]?.trim() || '#',
                    category: row[6]?.trim() || 'General',
                    image: row[7]?.trim() || 'https://placehold.co/720x1280/1a1a1a/ffffff?text=Image+Missing'
                }));
                
                // Latest news first (reversing the sheet order)
                newShorts.reverse();
                allShorts = newShorts; 
                
                // Re-render the feed
                renderShortsFeed(scrollIndexToMaintain);

            } catch (error) {
                console.error('ERROR: Failed to fetch shorts data:', error);
                // Display error message to the user if fetch fails
                document.getElementById('shorts-feed').innerHTML = `<div class="short-card flex justify-center items-center text-white/50 text-center p-4">
                    <p class="font-bold mb-2">Error!</p>
                    <p data-lang-key="noNewsFound">${translations[savedLanguage].noNewsFound}</p>
                    <p class="text-xs text-gray-400 mt-2">Check console for details, or verify API Key and Sheet ID.</p>
                </div>`;
            } finally {
                // End loading state
                isFetching = false;
                refreshIcon.classList.remove('fa-spin');
                refreshBtn.disabled = false;
            }
        }

        // --- Event Listeners and Initialization ---

        document.addEventListener('DOMContentLoaded', () => {
            updateUI(savedLanguage);
            // 1. Initial Load when the page opens
            fetchShortsData(false);
            
            // 2. Manual Refresh Listener
            document.getElementById('manual-refresh-btn').addEventListener('click', () => fetchShortsData(true));

            const container = document.getElementById('shorts-container');
            
            // Scroll event listener (Throttled for performance)
            let scrollTimeout;
            container.addEventListener('scroll', () => {
                if (!scrollTimeout) {
                    scrollTimeout = setTimeout(() => {
                        handleScroll();
                        scrollTimeout = null;
                    }, 100); 
                }
            });

            // 3. Navigation buttons
            document.getElementById('nav-up-btn').addEventListener('click', () => navigateShorts(-1));
            document.getElementById('nav-down-btn').addEventListener('click', () => navigateShorts(1));
        });

    </script>
</body>
</html>
