  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; }

    /* Theme Colors */
    :root {
      --bg-primary: #f9fafb; --bg-secondary: #ffffff; --text-primary: #111827;
      --text-secondary: #4b5563; --border-color: #e5e7eb; --blue-accent: #2563eb;
      --gradient-start: #1e40af; --gradient-end: #3b82f6;
      --red-accent: #dc2626;
    }
    html.dark {
      --bg-primary: #111827; --bg-secondary: #1f2937; --text-primary: #f9fafb;
      --text-secondary: #9ca3af; --border-color: #374151;
      --gradient-start: #1e3a8a; --gradient-end: #3b82f6;
      --red-accent: #f87171;
    }
    body { background-color: var(--bg-primary); color: var(--text-primary); transition: 0.3s; }
    .gradient-bg { background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end)); }

    /* Navigation & Headers */
    .sticky-header { backdrop-filter: blur(12px); background-color: rgba(255,255,255,0.9); }
    html.dark .sticky-header { background-color: rgba(31,41,55,0.9); }
    
    /* Cards */
    .news-card { 
      background-color: var(--bg-secondary); border: 1px solid var(--border-color); 
      transition: transform 0.3s ease, box-shadow 0.3s ease; opacity: 0; transform: translateY(20px);
      position: relative; display: flex; flex-direction: column;
    }
    .news-card.loaded { opacity: 1; transform: translateY(0); }
    .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    /* Bookmark Button on Card */
    .card-bookmark-btn {
        position: absolute; top: 10px; right: 10px; z-index: 20;
        background: rgba(255,255,255,0.9); border-radius: 50%; width: 35px; height: 35px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s; color: #9ca3af;
    }
    html.dark .card-bookmark-btn { background: rgba(31,41,55,0.9); color: #d1d5db; }
    .card-bookmark-btn:hover { transform: scale(1.1); }
    .card-bookmark-btn.active i { color: #ef4444; font-weight: 900; }

    /* Carousel */
    .carousel { position: relative; overflow: hidden; border-radius: 1.25rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); height: 400px; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.7s ease-in-out; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-text-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; }
    
    /* Loading & Skeleton */
    .skeleton { background-color: #e5e7eb; position: relative; overflow: hidden; }
    html.dark .skeleton { background-color: #374151; }
    .skeleton::after { content: ''; position: absolute; top: 0; left: -150%; width: 150%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shimmer 1.8s infinite; }
    @keyframes shimmer { 0% { left: -150%; } 100% { left: 150%; } }
    .loading-bar { position: fixed; top: 64px; left: 0; width: 100%; height: 3px; z-index: 999; }
    .loading-bar-inner { width: 100%; height: 100%; background: var(--blue-accent); animation: loading-animation 1.5s infinite; }
    @keyframes loading-animation { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* Pages & Modals */
    #news-detail-page, #profile-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-primary); z-index: 80; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); overflow-y: auto; }
    #news-detail-page.open, #profile-page.open { transform: translateX(0); }
    
    /* Detail Page Extras */
    #reading-progress-bar { position: sticky; top: 0; left: 0; width: 100%; height: 4px; background-color: var(--border-color); z-index: 90; }
    #reading-progress-bar-inner { width: 0%; height: 100%; background-color: var(--blue-accent); transition: width 0.1s linear; }
    .share-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background-color: var(--bg-primary); color: var(--text-secondary); transition: all 0.2s ease; border: 1px solid var(--border-color); }
    .share-btn:hover { transform: scale(1.1); color: white; border-color: transparent; }
    .share-btn.twitter:hover { background-color: #1DA1F2; }
    .share-btn.facebook:hover { background-color: #1877F2; }
    .share-btn.whatsapp:hover { background-color: #25D366; }
    .share-btn.copy:hover { background-color: var(--text-secondary); }

    /* Nav Panel */
    #nav-panel { position: fixed; top: 0; left: 0; height: 100%; width: 256px; background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); transform: translateX(-100%); transition: transform 0.3s ease-in-out; z-index: 90; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
    #nav-panel.open { transform: translateX(0); }

    /* Profile Tabs */
    .profile-tab { cursor: pointer; padding: 10px 20px; border-bottom: 2px solid transparent; color: var(--text-secondary); }
    .profile-tab.active { border-color: var(--blue-accent); color: var(--blue-accent); font-weight: bold; }
    .profile-content-section { display: none; }
    .profile-content-section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Toast Notification */
    #toast-container {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        pointer-events: none;
    }
    .toast-message {
        background-color: #1f2937;
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        font-size: 0.9rem;
        font-weight: 500;
        opacity: 0;
        transform: translateY(20px);
        animation: toast-in 0.3s forwards, toast-out 0.3s forwards 3s;
    }
    @keyframes toast-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes toast-out { to { opacity: 0; transform: translateY(20px); } }
  </style>

    const firebaseConfig = {

    // --- Utilities ---
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);
    const showLoading = () => $('#loading-bar').classList.remove('hidden');
    const hideLoading = () => $('#loading-bar').classList.add('hidden');
    
    // Improved Toast
    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 3500);
    }

    // --- Fetching Logic ---
    async function fetchWithRetry(url, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data.values) throw new Error('No data values');
                return data;
            } catch (error) {
                console.warn(`Attempt ${i+1} failed: ${error.message}`);
                if (i === retries - 1) throw error;
                await new Promise(r => setTimeout(r, 1000));
            }
        }
    }

    async function loadData() {
        showLoading();
        
        const cachedNews = localStorage.getItem(CACHE_KEY_NEWS);
        const now = Date.now();

        if (cachedNews) {
            const { timestamp, data } = JSON.parse(cachedNews);
            if (now - timestamp < CACHE_EXPIRY) {
                console.log("Loading News from Cache");
                allNews = data;
                $('#last-updated').innerText = 'Updated: Cached';
            }
        }

        if (allNews.length === 0) {
            try {
                console.log("Fetching fresh data...");
                const newsUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`;
                const newsData = await fetchWithRetry(newsUrl);

                allNews = newsData.values.slice(1).map(row => ({
                    rank: parseInt(row[0]) || 0,
                    headline: row[1]?.trim() || 'No Headline',
                    source: row[2]?.trim() || 'Unknown',
                    date: row[3]?.trim() || '',
                    description: row[4]?.trim() || '',
                    link: row[5]?.trim() || '#',
                    category: row[6]?.trim() || 'General',
                    image: row[7]?.trim() || `https://placehold.co/600x400?text=News`
                })).reverse();
                
                localStorage.setItem(CACHE_KEY_NEWS, JSON.stringify({ timestamp: now, data: allNews }));
                const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                $('#last-updated').innerText = `Updated: ${timeString}`;

            } catch (e) {
                console.error("Data Fetch Error:", e);
                showToast("Failed to load data. Check connection.");
            }
        }

        processData();
        hideLoading();
    }

    function processData() {
        topStories = allNews.filter(n => n.category.toLowerCase() === 'top story' && n.image).slice(0, 5);
        renderCarousel();
        
        const cats = ['All', ...new Set(allNews.map(n => n.category).filter(c => c.toLowerCase() !== 'top story'))];
        $('#mobile-category-scroll').innerHTML = cats.map(c => 
            `<button class="px-4 py-1 rounded-full text-sm border border-gray-300 dark:border-gray-600 whitespace-nowrap ${c === 'All' ? 'bg-blue-600 text-white border-transparent' : 'text-gray-600 dark:text-gray-300'}" onclick="window.filterCategory('${c}')">${c}</button>`
        ).join('');

        window.filterCategory('All');
    }

    // --- UI Rendering ---
    function renderCarousel() {
        const wrapper = $('#carousel-content-wrapper');
        if (topStories.length === 0) {
            wrapper.innerHTML = '<div class="flex items-center justify-center h-full text-gray-500">No Top Stories</div>';
            return;
        }
        let html = topStories.map((story, i) => `
            <div class="carousel-slide ${i === 0 ? 'active' : ''} cursor-pointer" onclick="window.openDetail('${encodeURIComponent(story.headline)}')">
                <img src="${story.image}" loading="lazy">
                <div class="carousel-text-container">
                    <span class="bg-blue-600 text-xs px-2 py-1 rounded mb-2 inline-block">${story.category}</span>
                    <h3 class="text-xl md:text-3xl font-bold leading-tight">${story.headline}</h3>
                </div>
            </div>
        `).join('');
        wrapper.innerHTML = html;
        startCarousel();
    }

    let slideInterval;
    function startCarousel() {
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(() => changeSlide(1), 5000);
    }
    function changeSlide(dir) {
        const slides = $$('.carousel-slide');
        let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
        slides[activeIdx].classList.remove('active');
        let nextIdx = (activeIdx + dir + slides.length) % slides.length;
        slides[nextIdx].classList.add('active');
    }
    $('#next-slide').onclick = () => { changeSlide(1); startCarousel(); };
    $('#prev-slide').onclick = () => { changeSlide(-1); startCarousel(); };

    window.filterCategory = (cat) => {
        currentCategory = cat;
        $('#section-title').innerText = cat === 'All' ? 'Latest News' : cat;
        
        filteredNews = cat === 'All' 
            ? allNews.filter(n => n.category.toLowerCase() !== 'top story') 
            : allNews.filter(n => n.category === cat);
        
        displayCount = 0;
        $('#news-feed').innerHTML = ''; 
        
        if(window.innerWidth < 768) {
           $('#news-feed').scrollIntoView({behavior: 'smooth', block: 'start'});
        }

        renderNews();
        
        $$('.nav-category').forEach(b => {
            if (b.dataset.category === cat) b.classList.add('text-blue-600', 'font-bold');
            else b.classList.remove('text-blue-600', 'font-bold');
        });
        
        const mobileBtns = $('#mobile-category-scroll').children;
        Array.from(mobileBtns).forEach(btn => {
            if(btn.innerText === cat) {
                btn.classList.add('bg-blue-600', 'text-white', 'border-transparent');
                btn.classList.remove('text-gray-600', 'dark:text-gray-300');
            } else {
                btn.classList.remove('bg-blue-600', 'text-white', 'border-transparent');
                btn.classList.add('text-gray-600', 'dark:text-gray-300');
            }
        });
        
        $('#nav-panel').classList.remove('open');
    }

    function renderNews() {
        const feed = $('#news-feed');
        const toShow = filteredNews.slice(displayCount, displayCount + CHUNK_SIZE);
        
        if (toShow.length === 0 && displayCount === 0) {
            feed.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500">No news found.</div>';
            $('#load-more-btn').style.display = 'none';
            return;
        }

        const html = toShow.map((item, index) => {
            const isBookmarked = userBookmarks.some(b => b.headline === item.headline);
            const heartClass = isBookmarked ? 'fas fa-heart text-red-500' : 'far fa-heart';
            
            return `
            <article class="news-card rounded-xl overflow-hidden bg-white dark:bg-gray-800 shadow-sm flex flex-col h-full" style="animation-delay: ${index * 50}ms">
                <div class="relative w-full h-48 flex-shrink-0 cursor-pointer overflow-hidden" onclick="window.openDetail('${encodeURIComponent(item.headline)}')">
                    <img src="${item.image}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=News'">
                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm font-bold uppercase">${item.category}</span>
                </div>
                <button class="card-bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="window.toggleBookmark('${encodeURIComponent(item.headline)}', this)">
                    <i class="${heartClass} text-lg"></i>
                </button>
                <div class="p-4 flex flex-col flex-1 cursor-pointer" onclick="window.openDetail('${encodeURIComponent(item.headline)}')">
                    <h3 class="text-lg font-bold leading-tight mb-2 hover:text-blue-600 dark:text-white transition line-clamp-2">${item.headline}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-3 line-clamp-3 flex-grow">${item.description}</p>
                    <div class="text-xs text-gray-400 mt-auto pt-3 border-t dark:border-gray-700 flex justify-between">
                        <span>${item.source}</span>
                        <span>${item.date}</span>
                    </div>
                </div>
            </article>
            `;
        }).join('');

        feed.insertAdjacentHTML('beforeend', html);
        
        setTimeout(() => {
            $$('.news-card:not(.loaded)').forEach(c => c.classList.add('loaded'));
        }, 50);

        displayCount += toShow.length;
        $('#load-more-btn').style.display = displayCount >= filteredNews.length ? 'none' : 'inline-block';
    }

    $('#load-more-btn').onclick = renderNews;

    // --- Realtime Database Sync (Indr.ai Features) ---
    let unsubscribeSnapshot = null;

    function setupRealtimeSync(user) {
        if (unsubscribeSnapshot) unsubscribeSnapshot();
        
        const userRef = doc(db, 'users', user.uid);
        unsubscribeSnapshot = onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                userBookmarks = data.bookmarks || [];
                userHistory = data.history || [];
                
                renderProfileContent();
                renderNewsHeartIcons(); 
                updateDetailHeart();
            } else {
                 // Create if doesn't exist (Fix for saving error)
                setDoc(userRef, { bookmarks: [], history: [] }, { merge: true });
            }
        });
    }

    function renderNewsHeartIcons() {
        // Simple re-render logic
    }
    
    function updateDetailHeart() {
        const detailHeadline = $('#detail-headline').innerText;
        if (!detailHeadline) return;
        const isBookmarked = userBookmarks.some(b => b.headline === detailHeadline);
        const heartBtn = $('#detail-bookmark-btn i');
        if (heartBtn) {
            heartBtn.className = isBookmarked ? 'fas fa-heart text-red-500 text-lg' : 'far fa-heart text-lg';
        }
    }

    // Helper to ensure NO undefined values
    const createItemObj = (item) => ({
        headline: item.headline || "Untitled",
        image: item.image || "https://placehold.co/600x400?text=News",
        category: item.category || "General",
        date: new Date().toISOString()
    });

    // History Logic
    async function addToHistory(item) {
        if (!currentUser) return;
        const userRef = doc(db, 'users', currentUser.uid);
        
        const newItem = createItemObj(item);
        userHistory = userHistory.filter(h => h.headline !== item.headline);
        userHistory.unshift(newItem);
        if (userHistory.length > 50) userHistory.pop();

        try {
            await setDoc(userRef, { history: userHistory }, { merge: true });
        } catch (e) { console.error("History save error", e); }
    }

    // FIXED Bookmark Logic
    window.toggleBookmark = async (encodedHeadline, btnElement) => {
        if (!currentUser) {
            showToast("Please Sign In to Bookmark");
            signInWithPopup(auth, provider);
            return;
        }
        const headline = decodeURIComponent(encodedHeadline);
        const item = allNews.find(n => n.headline === headline);
        if (!item) return;

        const userRef = doc(db, 'users', currentUser.uid);
        const isBookmarked = userBookmarks.some(b => b.headline === headline);
        const itemObj = userBookmarks.find(b => b.headline === headline) || createItemObj(item);

        let icon = btnElement ? btnElement.querySelector('i') : null;
        
        try {
            if (isBookmarked) {
                if(icon) {
                    icon.classList.replace('fas', 'far');
                    icon.classList.remove('text-red-500');
                }
                showToast("Removed from Bookmarks");
                await updateDoc(userRef, { bookmarks: arrayRemove(itemObj) });
            } else {
                if(icon) {
                    icon.classList.replace('far', 'fas');
                    icon.classList.add('text-red-500');
                }
                showToast("Added to Bookmarks");
                await setDoc(userRef, { bookmarks: arrayUnion(itemObj) }, { merge: true });
            }
        } catch (e) {
            console.error("Bookmark Error", e);
            showToast("Error: " + e.message); // SHOW ACTUAL ERROR
        }
    };

    // --- Detail View Logic ---
    const detailPage = $('#news-detail-page');
    const progressBar = $('#reading-progress-bar-inner');
    
    const updateReadingProgress = () => {
        const { scrollTop, scrollHeight, clientHeight } = detailPage;
        if (scrollHeight <= clientHeight) { progressBar.style.width = '100%'; return; }
        const scrollPercent = (scrollTop / (scrollHeight - clientHeight)) * 100;
        progressBar.style.width = `${scrollPercent}%`;
    };

    // TTS Logic (Enhanced)
    const ttsButton = $('#tts-button');
    function setupTTS(textToRead) {
        const icon = ttsButton.querySelector('i');
        const span = ttsButton.querySelector('span');
        if (speechSynthesis.speaking) speechSynthesis.cancel();
        icon.className = 'fas fa-play';
        span.textContent = 'Listen';

        ttsButton.onclick = () => {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                icon.className = 'fas fa-play';
                span.textContent = 'Listen';
            } else {
                const utterance = new SpeechSynthesisUtterance(textToRead);
                utterance.lang = 'en-US';
                utterance.onstart = () => { icon.className = 'fas fa-stop'; span.textContent = 'Stop'; };
                utterance.onend = () => { icon.className = 'fas fa-play'; span.textContent = 'Listen'; };
                speechSynthesis.speak(utterance);
            }
        };
    }

    function renderRelatedArticles(currentCategory, currentHeadline) {
        const grid = $('#related-articles-grid');
        const related = allNews.filter(n => n.category === currentCategory && n.headline !== currentHeadline).slice(0, 3);
        const section = $('#related-articles-section');
        if (related.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        grid.innerHTML = related.map(item => `
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden cursor-pointer group" onclick="window.openDetail('${encodeURIComponent(item.headline)}')">
                <div class="h-40 overflow-hidden relative">
                     <img src="${item.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://placehold.co/300x150?text=News'">
                     <span class="absolute bottom-2 left-2 bg-blue-600 text-white text-xs px-2 py-1 rounded">${item.category}</span>
                </div>
                <div class="p-3">
                     <h3 class="font-bold text-sm line-clamp-2 group-hover:text-blue-600 dark:text-gray-200 transition">${item.headline}</h3>
                </div>
            </div>
        `).join('');
    }

    window.openDetail = (encodedHeadline) => {
        const headline = decodeURIComponent(encodedHeadline);
        const item = allNews.find(n => n.headline === headline);
        if (!item) return;

        addToHistory(item);

        $('#detail-headline').innerText = item.headline;
        $('#detail-category-badge').innerText = item.category;
        $('#detail-source-date').innerText = `${item.source} • ${item.date}`;
        $('#detail-image').src = item.image;
        
        $('#detail-article-content').innerHTML = item.description.split('\n\n').map(p => `<p class="mb-4">${p}</p>`).join('');
        
        const words = item.description.trim().split(/\s+/).length;
        const readTime = Math.ceil(words / 225);
        $('#detail-read-time').innerHTML = `<i class="far fa-clock"></i> <span>~ ${readTime} min read</span>`;

        updateDetailHeart();
        $('#detail-bookmark-btn').onclick = function() {
             window.toggleBookmark(encodedHeadline, this);
        };

        const url = window.location.href; 
        const text = item.headline;
        $('#share-twitter').href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
        $('#share-facebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
        $('#share-whatsapp').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}%20${encodeURIComponent(url)}`;
        $('#share-copy').onclick = () => {
             navigator.clipboard.writeText(url);
             showToast("Link Copied!");
        };

        setupTTS(item.headline + ". " + item.description);
        renderRelatedArticles(item.category, item.headline);

        detailPage.scrollTop = 0;
        detailPage.classList.add('open');
        document.body.style.overflow = 'hidden';
        detailPage.addEventListener('scroll', updateReadingProgress);
    };

    $('#back-to-feed-btn').onclick = () => {
        detailPage.classList.remove('open');
        document.body.style.overflow = 'auto';
        speechSynthesis.cancel();
        detailPage.removeEventListener('scroll', updateReadingProgress);
        progressBar.style.width = '0%';
    };

    // --- Profile UI ---
    const toggleProfile = (show) => {
        const p = $('#profile-page');
        if (show) {
            p.classList.add('open');
            renderProfileContent();
            document.body.style.overflow = 'hidden';
        } else {
            p.classList.remove('open');
            document.body.style.overflow = 'auto';
        }
    };

    function renderProfileContent() {
        const hList = $('#history-list');
        if (userHistory.length === 0) hList.innerHTML = '<p class="text-center text-gray-400">No history yet.</p>';
        else hList.innerHTML = userHistory.map(h => `
            <div class="flex gap-3 p-2 bg-gray-50 dark:bg-gray-700 rounded cursor-pointer" onclick="toggleProfile(false); window.openDetail('${encodeURIComponent(h.headline)}')">
                <img src="${h.image}" class="w-16 h-12 object-cover rounded">
                <div class="overflow-hidden">
                    <p class="text-xs text-blue-500 font-bold">${h.category}</p>
                    <p class="text-sm font-medium truncate dark:text-white">${h.headline}</p>
                </div>
            </div>
        `).join('');

        const bList = $('#bookmarks-list');
        if (userBookmarks.length === 0) bList.innerHTML = '<p class="text-center text-gray-400">No bookmarks yet.</p>';
        else bList.innerHTML = userBookmarks.map(b => `
            <div class="flex gap-3 p-2 bg-gray-50 dark:bg-gray-700 rounded items-center">
                <img src="${b.image}" class="w-16 h-12 object-cover rounded cursor-pointer" onclick="toggleProfile(false); window.openDetail('${encodeURIComponent(b.headline)}')">
                <div class="flex-1 overflow-hidden cursor-pointer" onclick="toggleProfile(false); window.openDetail('${encodeURIComponent(b.headline)}')">
                    <p class="text-sm font-medium truncate dark:text-white">${b.headline}</p>
                </div>
                <button onclick="window.toggleBookmark('${encodeURIComponent(b.headline)}', this.parentElement)" class="p-2 text-red-500"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    $$('.profile-tab').forEach(tab => {
        tab.onclick = () => {
            $$('.profile-tab').forEach(t => t.classList.remove('active'));
            $$('.profile-content-section').forEach(s => s.classList.remove('active'));
            tab.classList.add('active');
            $(`#${tab.dataset.target}`).classList.add('active');
        };
    });

    // --- Auth & Events (Modular) ---
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            $('#sign-in-button').classList.add('hidden');
            $('#user-profile-button').classList.remove('hidden');
            $('#user-profile-photo').src = user.photoURL;
            $('#profile-name').innerText = user.displayName;
            $('#profile-email').innerText = user.email;
            $('#profile-photo-lg').src = user.photoURL;
            
            setupRealtimeSync(user);
        } else {
            $('#sign-in-button').classList.remove('hidden');
            $('#user-profile-button').classList.add('hidden');
            userBookmarks = [];
            userHistory = [];
            if(unsubscribeSnapshot) unsubscribeSnapshot();
            renderProfileContent();
        }
    });

    $('#sign-in-button').onclick = () => signInWithPopup(auth, provider);
    $('#profile-sign-out-btn').onclick = () => { signOut(auth); toggleProfile(false); showToast("Signed Out"); };
    $('#user-profile-button').onclick = () => toggleProfile(true);
    $('#mobile-profile-trigger').onclick = () => { if(currentUser) toggleProfile(true); else signInWithPopup(auth, provider); };
    $('#close-profile-btn').onclick = () => toggleProfile(false);

    $('#menu-toggle').onclick = () => $('#nav-panel').classList.add('open');
    $('#close-panel').onclick = () => $('#nav-panel').classList.remove('open');
    
    $$('.nav-category').forEach(btn => btn.onclick = () => window.filterCategory(btn.dataset.category));
    $$('.nav-category-mobile').forEach(btn => btn.onclick = () => { window.filterCategory(btn.dataset.category); $('#nav-panel').classList.remove('open'); });

    $('#dark-mode-toggle').onclick = () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        $('#dark-mode-toggle i').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
    };

    (function init() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            $('#dark-mode-toggle i').className = 'fas fa-sun';
        }
        loadData();
    })();
  </script>
</body>
</html>
