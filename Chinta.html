<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewsTally - Community</title>
  <meta name="description" content="Share your moments with the NewsTally Community." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fafafa;--card:#ffffff;--text:#262626;--border:#dbdbdb;--accent:#0095f6;}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text);}
    
    /* Instagram-like Card */
    .insta-card{background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:20px;}
    
    /* Image Upload Area */
    .uploader-area{border:2px dashed var(--border); border-radius:12px; transition:all 0.2s ease;}
    .uploader-area:hover, .uploader-area.drag-over{border-color:var(--accent); background:#f0f9ff;}
    
    /* Image Aspect Ratios */
    .post-image-container { position: relative; width: 100%; background: #efefef; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 300px; max-height: 600px;}
    .post-image { width: 100%; height: auto; display: block; object-fit: contain; max-height: 600px; }

    /* Heart Animation */
    .heart-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 5rem; pointer-events: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 0 10px rgba(0,0,0,0.3); opacity: 0;}
    .heart-overlay.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }

    /* Utility */
    .btn-primary{background:var(--accent); color:white; font-weight:600; border-radius:8px; transition: opacity 0.2s;}
    .btn-primary:hover{opacity:0.9;}
    .btn-primary:disabled{opacity:0.5; cursor:not-allowed;}
    
    .avatar { object-fit: cover; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="pb-20">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-300 sticky top-0 z-40 h-16 flex items-center justify-center px-4">
    <div class="max-w-5xl w-full flex justify-between items-center">
      <div class="text-xl font-bold tracking-tight italic">NewsTally</div>
      
      <!-- Desktop Search (Visual) -->
      <div class="hidden md:block relative">
        <input type="text" placeholder="Search" class="bg-gray-100 border border-none rounded-lg py-1 px-4 pl-9 text-sm focus:outline-none w-64 text-gray-600">
        <i class="fas fa-search absolute left-3 top-2 text-gray-400 text-xs"></i>
      </div>

      <div class="flex items-center gap-5 text-xl">
        <button id="nav-home" class="hover:text-gray-600"><i class="fas fa-home"></i></button>
        <button id="nav-add" class="hover:text-gray-600"><i class="far fa-plus-square"></i></button>
        <button id="nav-heart" class="hover:text-gray-600"><i class="far fa-heart"></i></button>
        <div class="relative group">
           <img id="my-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-7 h-7 rounded-full cursor-pointer border border-gray-300">
        </div>
        <button id="auth-btn" class="text-sm font-semibold text-blue-500">Login</button>
      </div>
    </div>
  </nav>

  <!-- Main Grid -->
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 pt-8 px-4">
    
    <!-- Left/Main: Feed -->
    <div class="md:col-span-2 flex flex-col gap-6" id="feed-container">
      <!-- Loading Skeleton -->
      <div class="insta-card p-4 animate-pulse">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
          <div class="h-4 bg-gray-200 rounded w-24"></div>
        </div>
        <div class="h-64 bg-gray-200 rounded w-full mb-4"></div>
        <div class="h-4 bg-gray-200 rounded w-3/4"></div>
      </div>
    </div>

    <!-- Right: Sidebar (Profile & Suggestions) -->
    <div class="hidden md:block md:col-span-1">
      <div class="sticky top-24">
        <div class="flex items-center gap-4 mb-6" id="sidebar-profile">
          <div class="w-14 h-14 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden">
            <img id="sidebar-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-full h-full object-cover">
          </div>
          <div>
            <div id="sidebar-username" class="font-bold text-sm text-gray-800">Guest</div>
            <div class="text-gray-500 text-xs">Welcome to NewsTally</div>
          </div>
          <button id="sidebar-login" class="text-xs font-bold text-blue-500 ml-auto">Switch</button>
        </div>

        <div class="flex justify-between items-center mb-3">
          <span class="text-gray-500 font-semibold text-sm">Suggestions For You</span>
          <span class="text-xs font-semibold text-gray-800 cursor-pointer">See All</span>
        </div>
        
        <!-- Dummy Suggestions -->
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-8 h-8 rounded-full border">
              <div class="text-xs font-semibold">tech_insider<br><span class="font-normal text-gray-400">New to Instagram</span></div>
            </div>
            <button class="text-xs font-bold text-blue-500">Follow</button>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" class="w-8 h-8 rounded-full border">
              <div class="text-xs font-semibold">design_daily<br><span class="font-normal text-gray-400">Followed by others</span></div>
            </div>
            <button class="text-xs font-bold text-blue-500">Follow</button>
          </div>
        </div>

        <div class="mt-8 text-xs text-gray-300 leading-5">
          © 2025 NEWSTALLY FROM KOTA
        </div>
      </div>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="create-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-2xl w-full max-h-[85vh] flex flex-col overflow-hidden shadow-2xl transition-transform transform scale-100">
      
      <!-- Header -->
      <div class="border-b border-gray-200 p-3 flex justify-between items-center">
        <button id="close-modal" class="text-gray-600 font-medium hover:text-black"><i class="fas fa-arrow-left"></i></button>
        <h3 class="font-bold text-base">Create new post</h3>
        <button id="share-btn" class="text-blue-500 font-bold text-sm disabled:text-blue-200">Share</button>
      </div>

      <!-- Body -->
      <div class="flex flex-col md:flex-row h-full overflow-auto bg-white">
        
        <!-- Image Upload Section -->
        <div class="w-full md:w-1/2 bg-gray-50 min-h-[300px] flex items-center justify-center border-r border-gray-100 relative">
          <div id="drop-zone" class="text-center p-6 w-full h-full flex flex-col items-center justify-center cursor-pointer">
            <i class="fas fa-images text-5xl text-gray-300 mb-4"></i>
            <p class="text-lg font-light mb-4">Drag photos here</p>
            <button id="browse-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold text-sm">Select from computer</button>
            <input type="file" id="file-input" accept="image/*" class="hidden">
          </div>
          <img id="image-preview" class="absolute inset-0 w-full h-full object-cover hidden">
          <button id="remove-image" class="absolute top-2 right-2 bg-gray-800/70 text-white rounded-full w-8 h-8 hidden"><i class="fas fa-times"></i></button>
        </div>

        <!-- Details Section -->
        <div class="w-full md:w-1/2 p-4 flex flex-col">
          <div class="flex items-center gap-3 mb-4">
            <img id="modal-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-8 h-8 rounded-full">
            <span id="modal-username" class="font-bold text-sm">username</span>
          </div>
          
          <textarea id="caption-input" class="w-full flex-1 resize-none outline-none text-sm text-gray-700 mb-4" placeholder="Write a caption..." rows="6"></textarea>
          
          <div class="border-t border-gray-200 py-3">
            <div class="flex justify-between items-center mb-2 cursor-pointer">
              <span class="text-gray-600 text-sm">Add Location</span>
              <i class="fas fa-map-marker-alt text-gray-400"></i>
            </div>
          </div>
          
          <!-- Progress Bar -->
          <div id="progress-container" class="w-full mt-auto hidden">
            <div class="flex justify-between text-xs text-gray-500 mb-1">
              <span>Uploading...</span>
              <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
              <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full w-0 transition-all duration-300"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-xl p-8 w-80 text-center shadow-2xl">
      <h2 class="text-2xl font-bold mb-2 italic">NewsTally</h2>
      <p class="text-gray-500 mb-6 text-sm">Sign in to see photos from your friends.</p>
      <button id="google-btn" class="w-full bg-blue-500 text-white py-2 rounded-lg font-semibold hover:bg-blue-600 transition">
        <i class="fab fa-google mr-2"></i> Log in with Google
      </button>
      <button id="close-auth" class="mt-4 text-sm text-gray-400 hover:text-gray-600">Close</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-sm px-6 py-3 rounded shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50">
    Notification
  </div>

  <!-- Firebase Module -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI",
      authDomain: "newstally-df03c.firebaseapp.com",
      projectId: "newstally-df03c",
      storageBucket: "newstally-df03c.appspot.com",
      messagingSenderId: "506893212961",
      appId: "1:506893212961:web:63882290195da992207260"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    const APP_ID = 'newstally-social';
    const COLLECTION_NAME = 'posts'; // Using the new 'posts' collection for Instagram features

    let currentUser = null;

    // UI Elements
    const navAdd = document.getElementById('nav-add');
    const authBtn = document.getElementById('auth-btn');
    const authModal = document.getElementById('auth-modal');
    const createModal = document.getElementById('create-modal');
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const imgPreview = document.getElementById('image-preview');
    const removeImg = document.getElementById('remove-image');
    const shareBtn = document.getElementById('share-btn');
    const feedContainer = document.getElementById('feed-container');
    const sidebarProfile = document.getElementById('sidebar-profile');

    // Auth Logic
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        authBtn.innerText = 'Logout';
        document.getElementById('my-avatar').src = user.photoURL;
        document.getElementById('sidebar-avatar').src = user.photoURL;
        document.getElementById('sidebar-username').innerText = user.displayName;
        document.getElementById('modal-avatar').src = user.photoURL;
        document.getElementById('modal-username').innerText = user.displayName;
        authModal.classList.add('hidden');
      } else {
        authBtn.innerText = 'Login';
        document.getElementById('sidebar-username').innerText = 'Guest';
        document.getElementById('my-avatar').src = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
      }
    });

    authBtn.addEventListener('click', () => {
      if (currentUser) signOut(auth);
      else authModal.classList.remove('hidden');
    });

    document.getElementById('sidebar-login').addEventListener('click', () => {
        if(currentUser) signOut(auth); else authModal.classList.remove('hidden');
    });

    document.getElementById('google-btn').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(err => showToast(err.message));
    });

    document.getElementById('close-auth').addEventListener('click', () => authModal.classList.add('hidden'));

    // --------------------
    // UPLOAD FLOW
    // --------------------
    
    // Open Modal
    navAdd.addEventListener('click', () => {
      if (!currentUser) {
        authModal.classList.remove('hidden');
        return;
      }
      createModal.classList.remove('hidden');
      resetComposer();
    });

    document.getElementById('close-modal').addEventListener('click', () => createModal.classList.add('hidden'));
    
    // Drag & Drop
    dropZone.addEventListener('click', () => fileInput.click());
    
    ['dragenter', 'dragover'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
    });
    
    dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      handleFileSelect(file);
    });

    fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));

    function handleFileSelect(file) {
      if (!file) return;
      // 1. Validate Type
      if (!file.type.startsWith('image/')) {
        showToast('Please select an image file (JPG, PNG).');
        return;
      }
      // 2. Validate Size (e.g. 10MB limit)
      if (file.size > 10 * 1024 * 1024) {
        showToast('File size too large (Max 10MB).');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        imgPreview.src = e.target.result;
        imgPreview.classList.remove('hidden');
        removeImg.classList.remove('hidden');
        dropZone.classList.add('hidden'); // Hide dropzone content
      };
      reader.readAsDataURL(file);
    }

    removeImg.addEventListener('click', resetComposer);

    function resetComposer() {
      fileInput.value = '';
      imgPreview.src = '';
      imgPreview.classList.add('hidden');
      removeImg.classList.add('hidden');
      dropZone.classList.remove('hidden');
      document.getElementById('caption-input').value = '';
      document.getElementById('progress-container').classList.add('hidden');
      shareBtn.disabled = false;
      shareBtn.innerText = 'Share';
    }

    // Upload to Firebase
    shareBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file && !imgPreview.src) {
        showToast('Select an image first.');
        return;
      }

      if(!file && imgPreview.src) {
         // Handle case where user dropped image but didn't use input? 
         // For simplicity, we rely on fileInput having the file object or drag event stored in a variable.
         // If drag event, we should have stored it.
         // Quick fix: The drag handler sets fileInput.files if possible, or we store in global var.
         // But for this demo, fileInput is reliable if we populated it manually (hard via JS security).
         // Let's rely on a global 'selectedFile' variable.
      }
      
      // We need a variable to hold the file from drag drop
      // Re-implementing handleFileSelect to store file
    });

    let selectedFile = null;
    function handleFileSelect(file) {
        if(!file) return;
        if(!file.type.startsWith('image/')) return showToast('Images only');
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            imgPreview.src = e.target.result;
            imgPreview.classList.remove('hidden');
            removeImg.classList.remove('hidden');
            dropZone.innerHTML = ''; // Clear text
        }
        reader.readAsDataURL(file);
    }

    shareBtn.addEventListener('click', async () => {
      if (!selectedFile) return showToast('Please select an image');
      if (!currentUser) return showToast('You must be logged in');

      shareBtn.disabled = true;
      shareBtn.innerText = 'Sharing...';
      const caption = document.getElementById('caption-input').value;
      
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const progressPercent = document.getElementById('progress-percent');
      
      progressContainer.classList.remove('hidden');

      try {
        // 1. Upload Image
        const timestamp = Date.now();
        const storagePath = `posts/${currentUser.uid}/${timestamp}_${selectedFile.name}`;
        const storageRef = ref(storage, storagePath);
        const uploadTask = uploadBytesResumable(storageRef, selectedFile);

        uploadTask.on('state_changed', 
          (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            progressBar.style.width = progress + '%';
            progressPercent.innerText = Math.round(progress) + '%';
          }, 
          (error) => {
            console.error(error);
            showToast('Upload failed: ' + error.message);
            shareBtn.disabled = false;
            shareBtn.innerText = 'Share';
          }, 
          async () => {
            // 2. Get URL & Save to Firestore
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME), {
              userId: currentUser.uid,
              username: currentUser.displayName || 'User',
              userAvatar: currentUser.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
              image: downloadURL,
              caption: caption,
              likes: [],
              createdAt: serverTimestamp()
            });

            showToast('Post shared successfully!');
            createModal.classList.add('hidden');
            resetComposer();
            selectedFile = null;
            // Restore dropzone
            dropZone.innerHTML = `<i class="fas fa-images text-5xl text-gray-300 mb-4"></i><p class="text-lg font-light mb-4">Drag photos here</p><button id="browse-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold text-sm">Select from computer</button><input type="file" id="file-input" accept="image/*" class="hidden">`;
          }
        );

      } catch (error) {
        console.error("Error adding post: ", error);
        showToast('Error: ' + error.message);
        shareBtn.disabled = false;
      }
    });


    // --------------------
    // FEED LOGIC
    // --------------------
    const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME), orderBy('createdAt', 'desc'), limit(50));
    
    onSnapshot(q, (snapshot) => {
      if(snapshot.empty) {
         feedContainer.innerHTML = `<div class="text-center py-10 text-gray-500">No posts yet. Be the first!</div>`;
         return;
      }
      
      feedContainer.innerHTML = ''; // Clear current feed
      
      snapshot.forEach(docSnap => {
        const post = docSnap.data();
        const pid = docSnap.id;
        const isLiked = currentUser && post.likes && post.likes.includes(currentUser.uid);
        
        const div = document.createElement('div');
        div.className = 'insta-card';
        div.innerHTML = `
          <!-- Header -->
          <div class="flex items-center justify-between p-3">
            <div class="flex items-center gap-3">
              <img src="${post.userAvatar}" class="w-8 h-8 rounded-full border object-cover">
              <span class="font-bold text-sm hover:underline cursor-pointer">${escapeHtml(post.username)}</span>
            </div>
            <button class="text-gray-600 hover:text-black"><i class="fas fa-ellipsis-h"></i></button>
          </div>

          <!-- Image -->
          <div class="post-image-container bg-black" ondblclick="handleDoubleTap('${pid}')">
            <img src="${post.image}" class="post-image">
            <div id="heart-${pid}" class="heart-overlay"><i class="fas fa-heart"></i></div>
          </div>

          <!-- Actions -->
          <div class="p-3">
            <div class="flex justify-between text-2xl mb-2">
              <div class="flex gap-4">
                <button onclick="toggleLike('${pid}')" class="hover:opacity-60 transition">
                  <i class="${isLiked ? 'fas text-red-500' : 'far text-black'} fa-heart" id="btn-heart-${pid}"></i>
                </button>
                <button class="hover:opacity-60" onclick="toggleComments('${pid}')"><i class="far fa-comment"></i></button>
                <button class="hover:opacity-60"><i class="far fa-paper-plane"></i></button>
              </div>
              <button class="hover:opacity-60"><i class="far fa-bookmark"></i></button>
            </div>
            
            <!-- Likes Count -->
            <div class="font-bold text-sm mb-1">${post.likes ? post.likes.length : 0} likes</div>
            
            <!-- Caption -->
            <div class="text-sm mb-2">
              <span class="font-bold mr-2">${escapeHtml(post.username)}</span>
              <span>${escapeHtml(post.caption)}</span>
            </div>
            
            <div class="text-gray-400 text-xs uppercase">${timeAgo(post.createdAt)}</div>
            
            <!-- Comments Section (Simple) -->
            <div id="comments-${pid}" class="hidden mt-3 border-t pt-3">
               <div class="flex gap-2">
                 <input type="text" placeholder="Add a comment..." class="flex-1 text-sm outline-none">
                 <button class="text-blue-500 font-semibold text-sm opacity-50 hover:opacity-100">Post</button>
               </div>
            </div>
          </div>
        `;
        feedContainer.appendChild(div);
      });
    });

    // Global helpers exposed to window for HTML onclick attributes
    window.toggleLike = async (pid) => {
      if (!currentUser) { authModal.classList.remove('hidden'); return; }
      const postRef = doc(db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, pid);
      // Optimistic UI update could go here, but we rely on onSnapshot for simplicity + accuracy
      // We need to check current state to toggle
      // Actually, arrayUnion and arrayRemove are safe concurrent ops.
      // We just need to know if we are adding or removing. 
      // We'll read a quick snapshot or check the UI state? 
      // Checking UI state is risky. Let's just use a transaction or check client cache?
      // For simplicity in this single-file, we'll just blindly try to add. 
      // If we want toggle, we need to know.
      // Let's use the class on the button.
      const btn = document.getElementById(`btn-heart-${pid}`);
      const isLiked = btn.classList.contains('fas');
      
      if (isLiked) {
         await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
      } else {
         await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
         animateHeart(pid);
      }
    };

    window.handleDoubleTap = async (pid) => {
       if(!currentUser) return;
       animateHeart(pid);
       const postRef = doc(db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, pid);
       await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
    }
    
    window.toggleComments = (pid) => {
      const el = document.getElementById(`comments-${pid}`);
      el.classList.toggle('hidden');
    }

    function animateHeart(pid) {
      const heart = document.getElementById(`heart-${pid}`);
      if(heart){
        heart.classList.add('active');
        setTimeout(() => heart.classList.remove('active'), 1000);
      }
    }

    function timeAgo(timestamp) {
      if (!timestamp) return 'Just now';
      const date = timestamp.toDate();
      const seconds = Math.floor((new Date() - date) / 1000);
      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + " years ago";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + " months ago";
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + " days ago";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + " hours ago";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + " minutes ago";
      return Math.floor(seconds) + " seconds ago";
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.remove('opacity-0');
      t.classList.remove('translate-y-4'); // optional animation fix
      setTimeout(() => t.classList.add('opacity-0'), 3000);
    }

  </script>
</body>
</html>
