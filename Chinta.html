<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewsTally - Community (Fixed Upload)</title>
  <meta name="description" content="NewsTally - Social News with Instagram-like Community" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8fafc;--card:#fff;--muted:#6b7280;--accent:#6366f1}
    html.dark{--bg:#0b1220;--card:#0f1724;--muted:#9ca3af;--accent:#7c3aed}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; background:var(--bg); color:#0f1724}
    .insta-card{background:var(--card); border-radius:14px; box-shadow:0 6px 18px rgba(16,24,40,0.06);}
    .uploader-drag{border:2px dashed rgba(15,23,42,0.06); border-radius:12px; background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4)); transition: border-color 0.2s;}
    .uploader-drag.drag-over { border-color: var(--accent); background: #eff6ff; }
    .image-preview{max-height:520px; object-fit:cover; border-radius:10px}
    .pill{background:rgba(99,102,241,0.08); color:var(--accent); padding:6px 8px; border-radius:999px; font-weight:600;}
    .glass{backdrop-filter:blur(6px); background:rgba(255,255,255,0.6)}
  </style>
</head>
<body class="antialiased">
  <div class="max-w-6xl mx-auto p-4">
    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-extrabold">NewsTally <span class="text-sm text-gray-500 font-medium">Community</span></h1>
      <div class="flex items-center gap-3">
        <button id="new-post-btn" class="px-4 py-2 rounded-full bg-gradient-to-r from-indigo-600 to-indigo-400 text-white font-semibold shadow-lg hover:brightness-105"><i class="fas fa-plus mr-2"></i>New Post</button>
        <button id="refresh-community" class="p-2 rounded-full glass"><i class="fas fa-sync-alt"></i></button>
      </div>
    </header>

    <!-- Composer + Feed Layout -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Left: Composer -->
      <div class="md:col-span-1 insta-card p-4">
        <h3 class="font-bold mb-3">Create Post</h3>
        <div id="composer" class="space-y-3">
          <label class="block text-sm font-medium text-gray-600">Image</label>
          
          <!-- Uploader Area -->
          <div id="uploader" class="uploader-drag p-3 flex flex-col gap-3 items-center justify-center cursor-pointer" tabindex="0">
            <input id="file-input" type="file" accept="image/*" class="hidden">
            <div id="upload-placeholder" class="text-center text-sm text-gray-500">
              <i class="fas fa-cloud-upload-alt text-3xl mb-2 text-indigo-500"></i>
              <div class="font-medium">Drag & drop an image, or <span class="text-indigo-600 underline">browse</span></div>
              <div class="text-xs text-gray-400 mt-1">JPEG/PNG up to 5MB</div>
            </div>
            <img id="local-preview" src="" alt="Preview" class="w-full rounded-lg mt-2 hidden image-preview">
          </div>

          <label class="block text-sm font-medium text-gray-600">Title / Topic</label>
          <input id="post-title" type="text" placeholder="Add a short headline" class="w-full p-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-300">

          <label class="block text-sm font-medium text-gray-600">Description</label>
          <textarea id="post-desc" rows="4" placeholder="Write something about this post..." class="w-full p-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-300"></textarea>

          <label class="block text-sm font-medium text-gray-600">Category</label>
          <div class="flex gap-2 items-center">
            <select id="post-category" class="p-2 border rounded-lg flex-1">
              <option value="General">General</option>
              <option value="Politics">Politics</option>
              <option value="Technology">Technology</option>
              <option value="Business">Business</option>
              <option value="Sports">Sports</option>
              <option value="Other">Other (custom)</option>
            </select>
            <input id="post-category-custom" class="p-2 border rounded-lg hidden" placeholder="Enter category" />
          </div>

          <!-- Buttons -->
          <div class="flex items-center gap-2">
            <button id="submit-post" class="flex-1 px-4 py-2 rounded-full bg-indigo-600 text-white font-semibold shadow hover:brightness-105 disabled:opacity-50 disabled:cursor-not-allowed">Post</button>
            <button id="clear-post" class="px-3 py-2 rounded-full border hover:bg-gray-50">Clear</button>
          </div>

          <!-- Progress Bar -->
          <div id="upload-progress" class="w-full bg-gray-200 rounded-full h-3 overflow-hidden hidden mt-2">
            <div id="upload-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300 ease-out"></div>
          </div>
          <div id="upload-status" class="text-xs text-center text-gray-500 hidden">Uploading... 0%</div>
        </div>
      </div>

      <!-- Middle: Feed -->
      <div class="md:col-span-2 space-y-6">
        <div id="community-feed" class="space-y-6">
          <!-- Loading state -->
          <div class="p-10 text-center">
            <i class="fas fa-circle-notch fa-spin text-indigo-500 text-2xl"></i>
            <p class="text-gray-400 mt-2">Loading community feed...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Composer Modal (Same as before) -->
  <div id="composer-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl w-[95%] md:w-[900px] max-h-[90vh] overflow-auto p-4 insta-card">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-lg font-bold">Create Post</h3>
        <button id="close-composer" class="p-2 rounded-full hover:bg-gray-100"><i class="fas fa-times"></i></button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <div class="uploader-drag p-3 cursor-pointer" id="modal-uploader" tabindex="0">
            <input id="modal-file-input" type="file" accept="image/*" class="hidden">
            <div id="modal-upload-placeholder" class="text-center text-gray-500 py-10">
              <i class="fas fa-image text-4xl text-indigo-500"></i>
              <div class="mt-2">Click to Select or Drop Image</div>
            </div>
            <img id="modal-preview" class="w-full mt-2 hidden image-preview" src="" alt="">
          </div>
        </div>
        <div>
          <input id="modal-title" class="w-full p-2 rounded-lg border mb-2" placeholder="Headline / Topic">
          <textarea id="modal-desc" rows="6" class="w-full p-2 rounded-lg border" placeholder="Write a caption..."></textarea>
          <div class="mt-3">
            <select id="modal-category" class="p-2 rounded-lg w-full border">
              <option>General</option>
              <option>Politics</option>
              <option>Technology</option>
              <option>Business</option>
              <option>Sports</option>
              <option>Other</option>
            </select>
            <input id="modal-category-custom" class="w-full p-2 rounded-lg border mt-2 hidden" placeholder="Custom category">
          </div>
          <div class="flex gap-2 mt-4">
            <button id="modal-post-btn" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-semibold disabled:opacity-50">Post</button>
            <button id="modal-cancel" class="py-2 px-4 rounded-lg border hover:bg-gray-50">Cancel</button>
          </div>
          <!-- Modal Progress -->
          <div id="modal-progress-wrap" class="mt-4 hidden">
             <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="modal-progress-bar" class="bg-indigo-600 h-2 rounded-full w-0"></div>
             </div>
             <div id="modal-status" class="text-xs text-center mt-1 text-gray-500">Uploading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase + Logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot, doc, updateDoc, arrayUnion } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js';

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI",
      authDomain: "newstally-df03c.firebaseapp.com",
      projectId: "newstally-df03c",
      storageBucket: "newstally-df03c.appspot.com",
      messagingSenderId: "506893212961",
      appId: "1:506893212961:web:63882290195da992207260"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();
    const APP_ID = 'newstally-social';

    // Elements - Main Composer
    const fileInput = document.getElementById('file-input');
    const uploader = document.getElementById('uploader');
    const preview = document.getElementById('local-preview');
    const uploadPlaceholder = document.getElementById('upload-placeholder');
    const titleEl = document.getElementById('post-title');
    const descEl = document.getElementById('post-desc');
    const categoryEl = document.getElementById('post-category');
    const categoryCustom = document.getElementById('post-category-custom');
    const submitBtn = document.getElementById('submit-post');
    const clearBtn = document.getElementById('clear-post');
    const progressBar = document.getElementById('upload-bar');
    const progressWrap = document.getElementById('upload-progress');
    const statusEl = document.getElementById('upload-status');
    const feed = document.getElementById('community-feed');
    
    // Elements - Modal
    const newPostBtn = document.getElementById('new-post-btn');
    const composerModal = document.getElementById('composer-modal');
    const modalFile = document.getElementById('modal-file-input');
    const modalPreview = document.getElementById('modal-preview');
    const modalPostBtn = document.getElementById('modal-post-btn');
    const modalCancel = document.getElementById('modal-cancel');
    const modalUploader = document.getElementById('modal-uploader');
    const modalPlaceholder = document.getElementById('modal-upload-placeholder');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');
    const modalCategory = document.getElementById('modal-category');
    const modalCategoryCustom = document.getElementById('modal-category-custom');
    const modalProgressWrap = document.getElementById('modal-progress-wrap');
    const modalProgressBar = document.getElementById('modal-progress-bar');
    const modalStatus = document.getElementById('modal-status');

    let currentUser = null;
    let selectedFileMain = null; // Store file explicitly for main composer
    let selectedFileModal = null; // Store file explicitly for modal

    // Auth State
    onAuthStateChanged(auth, (u) => { 
        currentUser = u; 
        console.log('User:', u ? u.displayName : 'Guest');
    });

    // --- Helper Functions ---
    function validateFile(file) {
        if (!file) return false;
        if (!file.type.startsWith('image/')) {
            alert('Only image files (JPG, PNG, GIF) are allowed.');
            return false;
        }
        if (file.size > 5 * 1024 * 1024) { // 5MB limit
            alert('File is too large. Max size is 5MB.');
            return false;
        }
        return true;
    }

    function showPreview(file, imgEl, placeholderEl) {
        const reader = new FileReader();
        reader.onload = () => {
            imgEl.src = reader.result;
            imgEl.classList.remove('hidden');
            if(placeholderEl) placeholderEl.classList.add('hidden');
        }
        reader.readAsDataURL(file);
    }

    function resetMainComposer() {
        selectedFileMain = null;
        fileInput.value = '';
        preview.src = '';
        preview.classList.add('hidden');
        uploadPlaceholder.classList.remove('hidden');
        titleEl.value = '';
        descEl.value = '';
        categoryEl.value = 'General';
        categoryCustom.classList.add('hidden');
        categoryCustom.value = '';
        progressWrap.classList.add('hidden');
        statusEl.classList.add('hidden');
        submitBtn.disabled = false;
    }

    // --- Drag & Drop + File Selection (Main) ---
    uploader.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (validateFile(f)) {
            selectedFileMain = f;
            showPreview(f, preview, uploadPlaceholder);
        }
    });

    ['dragenter', 'dragover'].forEach(ev => {
        uploader.addEventListener(ev, (e) => { 
            e.preventDefault(); 
            uploader.classList.add('drag-over'); 
        });
    });
    
    ['dragleave', 'drop'].forEach(ev => {
        uploader.addEventListener(ev, (e) => { 
            e.preventDefault(); 
            uploader.classList.remove('drag-over'); 
        });
    });

    uploader.addEventListener('drop', (e) => {
        const f = e.dataTransfer.files[0];
        if (validateFile(f)) {
            selectedFileMain = f;
            showPreview(f, preview, uploadPlaceholder);
        }
    });

    // --- Drag & Drop + File Selection (Modal) ---
    modalUploader.addEventListener('click', () => modalFile.click());
    
    modalFile.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (validateFile(f)) {
            selectedFileModal = f;
            showPreview(f, modalPreview, modalPlaceholder);
        }
    });

    modalUploader.addEventListener('dragenter', (e) => { e.preventDefault(); modalUploader.classList.add('bg-indigo-50'); });
    modalUploader.addEventListener('dragover', (e) => { e.preventDefault(); modalUploader.classList.add('bg-indigo-50'); });
    modalUploader.addEventListener('dragleave', (e) => { e.preventDefault(); modalUploader.classList.remove('bg-indigo-50'); });
    modalUploader.addEventListener('drop', (e) => {
        e.preventDefault();
        modalUploader.classList.remove('bg-indigo-50');
        const f = e.dataTransfer.files[0];
        if (validateFile(f)) {
            selectedFileModal = f;
            showPreview(f, modalPreview, modalPlaceholder);
        }
    });


    // --- Category Toggle ---
    categoryEl.addEventListener('change', () => {
        categoryCustom.classList.toggle('hidden', categoryEl.value !== 'Other');
    });
    modalCategory.addEventListener('change', () => {
        modalCategoryCustom.classList.toggle('hidden', modalCategory.value !== 'Other');
    });

    // --- Upload Logic ---
    async function handleUpload(file, meta, pBar, pWrap, status, btn) {
        if (!currentUser) {
            const doLogin = confirm('You need to sign in to post. Sign in with Google?');
            if (doLogin) {
                try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
            }
            return;
        }

        if (!file) {
            alert('Please select an image first.');
            return;
        }

        if (!meta.title) {
            alert('Please add a title.');
            return;
        }

        // Setup UI
        btn.disabled = true;
        btn.innerText = 'Uploading...';
        pWrap.classList.remove('hidden');
        if(status) { status.classList.remove('hidden'); status.innerText = 'Starting upload...'; }
        pBar.style.width = '0%';

        try {
            // 1. Storage Upload
            const fileName = `post_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const storagePath = `community/${fileName}`;
            const storageRef = sRef(storage, storagePath);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    pBar.style.width = progress + '%';
                    if(status) status.innerText = `Uploading... ${Math.round(progress)}%`;
                },
                (error) => {
                    console.error('Upload Error:', error);
                    alert('Upload failed: ' + error.message);
                    btn.disabled = false;
                    btn.innerText = 'Post';
                    pWrap.classList.add('hidden');
                },
                async () => {
                    // Success: Get URL
                    const url = await getDownloadURL(uploadTask.snapshot.ref);
                    
                    // 2. Firestore Write
                    const postData = {
                        headline: meta.title,
                        description: meta.desc,
                        category: meta.category,
                        image: url,
                        source: currentUser.displayName || 'Community User',
                        repostCount: 0,
                        likes: [],
                        timestamp: serverTimestamp(),
                        latestReposter: {
                            uid: currentUser.uid,
                            username: currentUser.displayName || 'User',
                            avatar: currentUser.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'
                        }
                    };

                    await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), postData);

                    // Cleanup
                    alert('Posted successfully!');
                    btn.disabled = false;
                    btn.innerText = 'Post';
                    resetMainComposer();
                    composerModal.classList.add('hidden');
                    
                    // Clear Modal specifically if used
                    modalFile.value = '';
                    selectedFileModal = null;
                    modalPreview.classList.add('hidden');
                    modalPlaceholder.classList.remove('hidden');
                    modalTitle.value = '';
                    modalDesc.value = '';
                    modalProgressWrap.classList.add('hidden');
                }
            );
        } catch (err) {
            console.error('Process Error:', err);
            alert('Error: ' + err.message);
            btn.disabled = false;
            btn.innerText = 'Post';
        }
    }

    // --- Button Listeners ---
    submitBtn.addEventListener('click', () => {
        const cat = categoryEl.value === 'Other' ? (categoryCustom.value || 'Other') : categoryEl.value;
        handleUpload(selectedFileMain, {
            title: titleEl.value,
            desc: descEl.value,
            category: cat
        }, progressBar, progressWrap, statusEl, submitBtn);
    });

    modalPostBtn.addEventListener('click', () => {
        const cat = modalCategory.value === 'Other' ? (modalCategoryCustom.value || 'Other') : modalCategory.value;
        handleUpload(selectedFileModal, {
            title: modalTitle.value,
            desc: modalDesc.value,
            category: cat
        }, modalProgressBar, modalProgressWrap, modalStatus, modalPostBtn);
    });

    clearBtn.addEventListener('click', resetMainComposer);

    // --- Modal Control ---
    newPostBtn.addEventListener('click', () => {
        if (!currentUser) {
            signInWithPopup(auth, provider).catch(console.error);
            return;
        }
        composerModal.classList.remove('hidden');
    });
    document.getElementById('close-composer').addEventListener('click', () => composerModal.classList.add('hidden'));
    modalCancel.addEventListener('click', () => composerModal.classList.add('hidden'));


    // --- Feed Listener ---
    const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), orderBy('timestamp', 'desc'), limit(50));
    
    onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
            feed.innerHTML = '<div class="text-center text-gray-400 py-12">No posts yet.</div>';
            return;
        }

        const posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFeed(posts);
    }, (err) => {
        console.error('Feed Error:', err);
        feed.innerHTML = '<div class="text-red-500 text-center py-10">Error loading posts.</div>';
    });

    function renderFeed(posts) {
        feed.innerHTML = posts.map(p => {
            const t = p.timestamp ? new Date(p.timestamp.seconds * 1000).toLocaleString() : '';
            const isLiked = currentUser && p.likes && p.likes.includes(currentUser.uid);
            const likeCount = p.likes ? p.likes.length : 0;

            return `
                <div class="insta-card p-4 fade-in">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${p.latestReposter?.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-10 h-10 rounded-full border object-cover">
                        <div class="flex-1">
                            <div class="font-semibold text-gray-900">${escapeHtml(p.latestReposter?.username || p.source)}</div>
                            <div class="text-xs text-gray-500">${escapeHtml(p.category || 'General')} • ${t}</div>
                        </div>
                        <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-ellipsis-h"></i></button>
                    </div>
                    
                    <div class="mb-3 bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                        <img src="${p.image}" alt="Post Image" class="w-full h-auto max-h-[600px] object-contain">
                    </div>

                    <div class="flex items-center justify-between gap-3 mb-2">
                        <div class="flex items-center gap-4">
                            <button class="like-btn transition transform active:scale-125 ${isLiked ? 'text-red-500' : 'text-gray-600 hover:text-red-500'}" data-id="${p.id}">
                                <i class="${isLiked ? 'fas' : 'far'} fa-heart text-xl"></i>
                            </button>
                            <button class="text-gray-600 hover:text-indigo-500"><i class="far fa-comment text-xl"></i></button>
                            <button class="text-gray-600 hover:text-indigo-500"><i class="fas fa-share text-xl"></i></button>
                        </div>
                        <div class="font-semibold text-sm text-gray-700">${likeCount} likes</div>
                    </div>

                    <div class="mb-1">
                        <span class="font-bold mr-2 text-gray-900">${escapeHtml(p.latestReposter?.username || 'User')}</span>
                        <span class="font-bold text-gray-800">${escapeHtml(p.headline)}</span>
                    </div>
                    <div class="text-sm text-gray-600 leading-relaxed">${escapeHtml(p.description || '')}</div>
                </div>
            `;
        }).join('');

        // Attach Like Listeners
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                if (!currentUser) {
                    signInWithPopup(auth, provider);
                    return;
                }
                
                // Optimistic UI update (Optional: simplifies UX)
                const icon = btn.querySelector('i');
                const isLiked = icon.classList.contains('fas');
                
                try {
                    const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'reposts', id);
                    if (isLiked) {
                        await updateDoc(ref, { likes: window.firebase.firestore.FieldValue.arrayRemove(currentUser.uid) }); // Fallback if arrayRemove import fails
                        // Note: We imported arrayUnion, but need arrayRemove too or use generic logic.
                        // Since we are in module, use the imported one.
                    } else {
                        await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
                    }
                } catch (err) {
                    console.error('Like failed', err);
                }
            });
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    
    // Refresh
    document.getElementById('refresh-community').addEventListener('click', () => {
        // Snapshot listener updates automatically, but we can show a toast
        alert('Feed is live updated!');
    });

  </script>
</body>
</html>
