<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NewsTally - Premium Social News</title>
  <meta name="description" content="NewsTally - Read, Repost, Connect." />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome (Pro-like) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb; --bg-app: #fafafa; --card-bg: #ffffff; --text-main: #262626; --border: #dbdbdb;
    }
    html.dark {
      --primary: #60a5fa; --bg-app: #000000; --card-bg: #121212; --text-main: #f5f5f5; --border: #262626;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-app); color: var(--text-main); -webkit-font-smoothing: antialiased; }

    /* --- INSTAGRAM-STYLE UI UTILITIES --- */
    .insta-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    /* Mobile: remove borders/radius for edge-to-edge feel */
    @media (max-width: 768px) {
      .insta-card { border-left: none; border-right: none; border-radius: 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    }

    /* Smooth Image Loading */
    .img-fade-in { opacity: 0; transition: opacity 0.4s ease-in-out; }
    .img-loaded { opacity: 1; }

    /* Carousel Stability Fixes */
    .carousel-wrapper { position: relative; height: 400px; overflow: hidden; border-radius: 16px; background: #e5e5e5; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease-in-out; z-index: 1; pointer-events: none; }
    .carousel-slide.active { opacity: 1; z-index: 2; pointer-events: auto; }
    .carousel-overlay { background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); }

    /* Modals & Transitions */
    .page-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: var(--bg-app); z-index: 50; 
      transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      overflow-y: auto;
    }
    .page-layer.open { transform: translateX(0); }

    /* Shimmer / Skeleton */
    .skeleton { background: #e1e9ee; background-image: linear-gradient(90deg, #e1e9ee 0px, #f4f8fa 40px, #e1e9ee 80px); background-size: 600px; animation: shimmer 1.6s infinite linear; }
    html.dark .skeleton { background: #1e1e1e; background-image: linear-gradient(90deg, #1e1e1e 0px, #2a2a2a 40px, #1e1e1e 80px); }
    @keyframes shimmer { 0% { background-position: -100px; } 100% { background-position: 100px; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    html.dark ::-webkit-scrollbar-thumb { background: #444; }

    /* Like Animation */
    .heart-anim { animation: like-bounce 0.3s; color: #ef4444 !important; }
    @keyframes like-bounce { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    
    /* Header Glass */
    header { background: rgba(255,255,255,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    html.dark header { background: rgba(0,0,0,0.9); }
  </style>
</head>
<body class="pb-16 md:pb-0">

  <!-- TOP NAV -->
  <header class="fixed top-0 w-full z-40 h-14 flex items-center justify-between px-4 md:px-6">
    <!-- Logo -->
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
      <div class="bg-gradient-to-tr from-blue-600 to-purple-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-lg">N</div>
      <h1 class="text-xl font-bold tracking-tight hidden md:block">NewsTally</h1>
    </div>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-8 font-medium text-sm text-gray-500 dark:text-gray-400">
      <button onclick="switchView('home')" class="nav-link hover:text-blue-600 transition active-nav" data-target="home">Top Stories</button>
      <button onclick="filterCategory('Politics')" class="nav-link hover:text-blue-600 transition">Politics</button>
      <button onclick="filterCategory('Technology')" class="nav-link hover:text-blue-600 transition">Tech</button>
      <button onclick="switchView('community')" class="nav-link hover:text-purple-500 transition font-semibold flex items-center gap-2" data-target="community"><i class="fas fa-fire"></i> Community</button>
    </nav>

    <!-- Right Actions -->
    <div class="flex items-center gap-4">
      <button id="dark-mode-toggle" class="w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center justify-center transition"><i class="far fa-moon"></i></button>
      
      <!-- Auth State -->
      <button id="sign-in-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-full text-sm font-bold transition shadow-sm">Sign In</button>
      
      <div id="user-actions" class="hidden flex items-center gap-3">
        <!-- Create Post (Desktop) -->
        <button onclick="openCreatePostModal()" class="hidden md:flex w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 items-center justify-center text-xl"><i class="far fa-plus-square"></i></button>
        <!-- Profile -->
        <img id="header-avatar" src="" class="w-8 h-8 rounded-full object-cover border border-gray-200 cursor-pointer" onclick="openProfile()">
        <!-- Quick Logout -->
        <button onclick="doLogout()" class="text-gray-400 hover:text-red-500 ml-1" title="Sign Out"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="pt-16 max-w-5xl mx-auto min-h-screen">
    
    <!-- VIEW: HOME (News) -->
    <div id="view-home" class="animate-fade">
      
      <!-- Trending Carousel -->
      <div class="px-4 md:px-0 mb-8">
        <div class="carousel-wrapper shadow-lg">
          <div id="carousel-track" class="w-full h-full relative">
            <!-- Skeletons injected via JS -->
            <div class="skeleton w-full h-full absolute inset-0"></div>
          </div>
          <!-- Controls -->
          <button id="prev-slide" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 backdrop-blur-md hover:bg-white/40 text-white p-3 rounded-full z-10"><i class="fas fa-chevron-left"></i></button>
          <button id="next-slide" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 backdrop-blur-md hover:bg-white/40 text-white p-3 rounded-full z-10"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>

      <!-- News Grid -->
      <div class="px-4 md:px-0">
        <div class="flex items-center justify-between mb-6 border-l-4 border-blue-600 pl-3">
           <h2 class="text-2xl font-bold">Latest Headlines</h2>
           <span id="category-label" class="text-sm font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">All</span>
        </div>
        
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Skeletons -->
          <div class="h-80 rounded-xl bg-gray-100 dark:bg-gray-800 skeleton"></div>
          <div class="h-80 rounded-xl bg-gray-100 dark:bg-gray-800 skeleton"></div>
          <div class="h-80 rounded-xl bg-gray-100 dark:bg-gray-800 skeleton"></div>
        </div>
        
        <div class="text-center mt-10 mb-10">
          <button id="load-more-btn" class="px-8 py-3 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-full font-semibold shadow-sm hover:shadow-md transition text-sm">Load More</button>
        </div>
      </div>
    </div>

    <!-- VIEW: COMMUNITY (Instagram Style) -->
    <div id="view-community" class="hidden max-w-lg mx-auto px-0 md:px-4">
      
      <!-- Stories / Header Area -->
      <div class="flex items-center justify-between px-4 py-4 mb-2">
        <h2 class="text-xl font-bold tracking-tight">Community Feed</h2>
        <button onclick="openCreatePostModal()" class="text-blue-500 font-semibold text-sm md:hidden">Create</button>
      </div>

      <!-- Feed Container -->
      <div id="community-feed" class="space-y-4 pb-20">
        <!-- Loading Skeletons -->
        <div class="insta-card p-4 space-y-4">
           <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full skeleton"></div><div class="h-4 w-32 skeleton"></div></div>
           <div class="h-64 w-full skeleton rounded"></div>
           <div class="h-4 w-3/4 skeleton"></div>
        </div>
      </div>

      <!-- Create Post FAB (Mobile) -->
      <button onclick="openCreatePostModal()" class="md:hidden fixed bottom-20 right-5 w-14 h-14 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-full shadow-xl flex items-center justify-center text-2xl z-30 active:scale-90 transition">
        <i class="fas fa-plus"></i>
      </button>
    </div>

  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="md:hidden fixed bottom-0 w-full bg-white dark:bg-black border-t dark:border-gray-800 flex justify-around py-3 z-40 safe-pb">
    <button onclick="switchView('home')" class="nav-icon active text-gray-400 hover:text-blue-600 flex flex-col items-center gap-1"><i class="fas fa-home text-xl"></i></button>
    <button onclick="switchView('community')" class="nav-icon text-gray-400 hover:text-purple-500 flex flex-col items-center gap-1"><i class="fas fa-compass text-xl"></i></button>
    <button onclick="openProfile()" class="nav-icon text-gray-400 hover:text-gray-900 dark:hover:text-white flex flex-col items-center gap-1">
        <img id="btm-avatar" src="https://via.placeholder.com/30" class="w-6 h-6 rounded-full border border-gray-300">
    </button>
  </nav>

  <!-- === MODALS === -->

  <!-- 1. NEWS DETAIL PAGE -->
  <div id="news-detail-page" class="page-layer bg-white dark:bg-black">
    <div class="sticky top-0 flex items-center justify-between p-4 bg-white/90 dark:bg-black/90 backdrop-blur z-20 border-b dark:border-gray-800">
      <button onclick="closePage('news-detail-page')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800"><i class="fas fa-arrow-left"></i></button>
      <div class="flex gap-4 text-xl text-gray-600 dark:text-gray-300">
        <button onclick="repostCurrentNews()" class="hover:text-green-500"><i class="fas fa-retweet"></i></button>
        <button onclick="bookmarkCurrentNews()" class="hover:text-yellow-500"><i class="far fa-bookmark"></i></button>
      </div>
    </div>
    <div class="max-w-3xl mx-auto p-5 pb-20">
       <span id="nd-cat" class="text-xs font-bold text-blue-600 uppercase tracking-wide">Category</span>
       <h1 id="nd-title" class="text-2xl md:text-4xl font-black mt-2 mb-4 leading-tight">Headline</h1>
       <div class="flex items-center gap-2 text-sm text-gray-500 mb-6">
         <span id="nd-source" class="font-bold text-gray-900 dark:text-gray-100">Source</span> • <span id="nd-date">Date</span>
       </div>
       <img id="nd-img" src="" class="w-full rounded-xl shadow-sm mb-8 object-cover max-h-[500px]">
       <div id="nd-body" class="prose dark:prose-invert prose-lg max-w-none text-gray-800 dark:text-gray-200 leading-relaxed"></div>
    </div>
  </div>

  <!-- 2. PROFILE PAGE -->
  <div id="profile-page" class="page-layer bg-white dark:bg-black">
    <div class="sticky top-0 flex items-center justify-between p-4 bg-white/90 dark:bg-black/90 backdrop-blur z-20 border-b dark:border-gray-800">
      <h2 class="font-bold text-lg">Profile</h2>
      <button onclick="closePage('profile-page')" class="text-2xl"><i class="fas fa-times"></i></button>
    </div>
    <div class="max-w-2xl mx-auto p-4">
      <!-- Header -->
      <div class="flex items-center gap-6 mb-8">
        <img id="p-avatar" src="" class="w-20 h-20 rounded-full border-2 border-gray-200 p-1">
        <div class="flex-1">
          <h2 id="p-name" class="text-xl font-bold">Name</h2>
          <p id="p-username" class="text-sm text-gray-500 mb-3">@username</p>
          <button onclick="doLogout()" class="text-xs bg-gray-100 dark:bg-gray-800 border dark:border-gray-700 px-4 py-2 rounded font-semibold hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition">Sign Out</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b dark:border-gray-800 mb-4">
        <button class="flex-1 py-3 font-semibold border-b-2 border-black dark:border-white" onclick="switchProfileTab('reposts')"><i class="fas fa-th"></i> Reposts</button>
        <button class="flex-1 py-3 font-semibold text-gray-400 hover:text-gray-600" onclick="switchProfileTab('bookmarks')"><i class="far fa-bookmark"></i> Saved</button>
      </div>

      <!-- Grid Content -->
      <div id="p-reposts-grid" class="grid grid-cols-3 gap-1">
        <!-- Images injected here -->
      </div>
      <div id="p-bookmarks-list" class="hidden space-y-3">
        <!-- Bookmarks list here -->
      </div>
    </div>
  </div>

  <!-- 3. CREATE POST MODAL -->
  <div id="create-modal" class="fixed inset-0 z-50 hidden bg-black/60 items-center justify-center">
    <div class="bg-white dark:bg-gray-900 w-full max-w-md md:rounded-xl h-full md:h-auto md:max-h-[90vh] flex flex-col animate-fade">
      <div class="p-3 border-b dark:border-gray-800 flex justify-between items-center">
        <button onclick="closeCreatePostModal()" class="text-gray-500 hover:text-black dark:hover:text-white">Cancel</button>
        <h3 class="font-bold">New Post</h3>
        <button id="share-btn" class="text-blue-500 font-bold opacity-50" disabled>Share</button>
      </div>
      
      <div class="p-4 flex-1 overflow-y-auto">
        <!-- Uploader -->
        <div id="drop-area" class="aspect-square bg-gray-100 dark:bg-gray-800 rounded-xl flex flex-col items-center justify-center cursor-pointer mb-4 border-2 border-dashed border-transparent hover:border-blue-500 transition relative overflow-hidden">
           <div id="upload-ui" class="text-center">
             <i class="fas fa-images text-4xl text-gray-300 mb-2"></i>
             <p class="text-sm font-medium text-blue-500">Select Photo</p>
           </div>
           <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
           <input type="file" id="file-in" class="hidden" accept="image/*">
        </div>
        
        <!-- Caption -->
        <div class="flex gap-3">
          <img id="create-avatar" src="" class="w-8 h-8 rounded-full">
          <textarea id="caption-in" class="flex-1 bg-transparent outline-none resize-none mt-1" rows="3" placeholder="Write a caption..."></textarea>
        </div>

        <!-- Progress -->
        <div id="progress-bar" class="h-1 bg-blue-600 w-0 transition-all mt-4 hidden"></div>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="fixed bottom-20 md:bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl text-sm font-medium opacity-0 pointer-events-none transition-opacity z-[100] flex items-center gap-2">
    <i class="fas fa-info-circle"></i> <span>Action successful</span>
  </div>

  <!-- LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, getDoc, onSnapshot, arrayUnion, arrayRemove, collection, addDoc, query, limit, where, getDocs, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI", 
        authDomain: "newstally-df03c.firebaseapp.com", 
        projectId: "newstally-df03c", 
        storageBucket: "newstally-df03c.appspot.com", 
        messagingSenderId: "506893212961", 
        appId: "1:506893212961:web:63882290195da992207260" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const APP_ID = 'newstally-social';

    // --- STATE ---
    let currentUser = null;
    let newsData = [];
    let newsLimit = 9;
    let currentCategory = 'All';
    let currentNewsItem = null;

    // --- AUTH ---
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if(user) {
        document.getElementById('sign-in-btn').classList.add('hidden');
        document.getElementById('user-actions').classList.remove('hidden');
        document.getElementById('user-actions').classList.add('flex');
        
        const av = user.photoURL || 'https://via.placeholder.com/40';
        document.getElementById('header-avatar').src = av;
        document.getElementById('btm-avatar').src = av;
        document.getElementById('p-avatar').src = av;
        document.getElementById('p-name').innerText = user.displayName;
        document.getElementById('create-avatar').src = av;

        // Ensure User Doc Exists
        const userRef = doc(db, 'users', user.uid);
        await setDoc(userRef, { 
            displayName: user.displayName, 
            photoURL: user.photoURL, 
            email: user.email,
            username: user.email.split('@')[0] 
        }, { merge: true });

        // Fetch username
        getDoc(userRef).then(s => {
            if(s.exists()) document.getElementById('p-username').innerText = '@' + (s.data().username || 'user');
        });
      } else {
        document.getElementById('sign-in-btn').classList.remove('hidden');
        document.getElementById('user-actions').classList.add('hidden');
        document.getElementById('user-actions').classList.remove('flex');
        document.getElementById('btm-avatar').src = 'https://via.placeholder.com/30';
      }
    });

    window.doLogout = () => {
        if(confirm("Are you sure you want to sign out?")) {
            signOut(auth).then(() => {
                showToast("Signed Out");
                closePage('profile-page');
            });
        }
    };

    document.getElementById('sign-in-btn').onclick = () => signInWithPopup(auth, provider);

    // --- NEWS LOGIC ---
    const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
    const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';

    async function fetchNews() {
        try {
            const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`);
            const json = await res.json();
            const rows = json.values.slice(1); // Skip header
            
            newsData = rows.map(r => ({
                headline: r[1], source: r[2], date: r[3], 
                desc: r[4], category: r[6] || 'General', 
                image: (r[7] && r[7].startsWith('http')) ? r[7] : `https://placehold.co/600x400?text=News`
            })).reverse();
            
            renderCarousel();
            renderNewsGrid();
        } catch(e) { console.error("News Error", e); }
    }

    function renderCarousel() {
        const top = newsData.filter(n => n.category === 'Top Story').slice(0, 5);
        const track = document.getElementById('carousel-track');
        
        if(!top.length) return;
        
        track.innerHTML = top.map((n, i) => `
            <div class="carousel-slide ${i===0?'active':''}" data-idx="${i}">
                <img src="${n.image}" class="w-full h-full object-cover">
                <div class="carousel-overlay absolute inset-0 flex flex-col justify-end p-6 text-white">
                    <span class="bg-blue-600 w-max px-2 py-1 text-xs font-bold uppercase rounded mb-2">${n.category}</span>
                    <h2 class="text-2xl md:text-4xl font-black leading-tight drop-shadow-md cursor-pointer hover:underline" onclick="openNewsDetail('${encodeURIComponent(n.headline)}')">${n.headline}</h2>
                </div>
            </div>
        `).join('');

        // Auto Play
        let idx = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        if(slides.length > 1) {
            setInterval(() => {
                slides[idx].classList.remove('active');
                idx = (idx + 1) % slides.length;
                slides[idx].classList.add('active');
            }, 5000);
        }
    }

    function renderNewsGrid() {
        const grid = document.getElementById('news-grid');
        const filtered = currentCategory === 'All' ? newsData : newsData.filter(n => n.category === currentCategory);
        const visible = filtered.slice(0, newsLimit);

        document.getElementById('category-label').innerText = currentCategory;

        grid.innerHTML = visible.map(n => `
            <div class="group cursor-pointer" onclick="openNewsDetail('${encodeURIComponent(n.headline)}')">
                <div class="aspect-video overflow-hidden rounded-xl bg-gray-100 dark:bg-gray-800 relative mb-3">
                    <img src="${n.image}" loading="lazy" class="w-full h-full object-cover transition duration-500 group-hover:scale-105 img-fade-in" onload="this.classList.add('img-loaded')">
                    <div class="absolute bottom-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm font-medium">${n.source}</div>
                </div>
                <h3 class="font-bold text-lg leading-snug group-hover:text-blue-600 transition-colors">${n.headline}</h3>
                <p class="text-sm text-gray-400 mt-1">${n.date}</p>
            </div>
        `).join('');

        document.getElementById('load-more-btn').style.display = newsLimit >= filtered.length ? 'none' : 'inline-block';
    }

    window.filterCategory = (cat) => {
        currentCategory = cat;
        newsLimit = 9;
        switchView('home');
        renderNewsGrid();
    };

    document.getElementById('load-more-btn').onclick = () => { newsLimit += 6; renderNewsGrid(); };

    // --- NEWS DETAIL ---
    window.openNewsDetail = (encTitle) => {
        const n = newsData.find(i => i.headline === decodeURIComponent(encTitle));
        if(!n) return;
        currentNewsItem = n;

        document.getElementById('nd-cat').innerText = n.category;
        document.getElementById('nd-title').innerText = n.headline;
        document.getElementById('nd-source').innerText = n.source;
        document.getElementById('nd-date').innerText = n.date;
        document.getElementById('nd-img').src = n.image;
        document.getElementById('nd-body').innerHTML = n.desc.split('\n').map(p => `<p class="mb-4">${p}</p>`).join('');
        
        document.getElementById('news-detail-page').classList.add('open');
    };

    window.repostCurrentNews = async () => {
        if(!currentUser) { signInWithPopup(auth, provider); return; }
        if(!currentNewsItem) return;

        const id = btoa(encodeURIComponent(currentNewsItem.headline)).replace(/=/g,'');
        const ref = doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), id);
        
        const snap = await getDoc(ref);
        if(snap.exists() && snap.data().reposters.includes(currentUser.uid)) {
            showToast("Already reposted!"); return;
        }

        const payload = {
            headline: currentNewsItem.headline,
            image: currentNewsItem.image,
            source: currentNewsItem.source,
            reposters: arrayUnion(currentUser.uid),
            repostCount: increment(1),
            timestamp: new Date().toISOString(),
            latestReposter: { username: currentUser.displayName, uid: currentUser.uid, avatar: currentUser.photoURL }
        };
        
        await setDoc(ref, payload, { merge: true });
        showToast("Reposted to Community!");
        closePage('news-detail-page');
        switchView('community');
    };

    // --- COMMUNITY FEED (Instagram Style) ---
    let commUnsub = null;

    window.loadCommunity = () => {
        const feed = document.getElementById('community-feed');
        if(!commUnsub) {
             // Skeleton Initial Load
             feed.innerHTML = [1,2].map(() => `
                <div class="insta-card p-4 space-y-4">
                   <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full skeleton"></div><div class="h-4 w-32 skeleton"></div></div>
                   <div class="aspect-square w-full skeleton rounded"></div>
                </div>
             `).join('');

             const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), limit(50));
             
             commUnsub = onSnapshot(q, (snap) => {
                 if(snap.empty) { feed.innerHTML = "<div class='text-center py-10 text-gray-400'>No posts yet.</div>"; return; }
                 
                 const docs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                 
                 feed.innerHTML = docs.map(p => {
                     const isLiked = currentUser && p.likes && p.likes.includes(currentUser.uid);
                     const username = p.latestReposter?.username || p.source || 'User';
                     const avatar = p.latestReposter?.avatar || 'https://via.placeholder.com/40';
                     const isUserPost = p.isUserPost || false;
                     const caption = isUserPost ? (p.headline || '') : p.headline;
                     const subHeader = isUserPost ? '' : `<span class="text-xs text-gray-400 ml-2">Reposted News</span>`;

                     return `
                        <div class="insta-card bg-white dark:bg-gray-900 animate-fade">
                            <!-- Header -->
                            <div class="flex items-center justify-between p-3">
                                <div class="flex items-center gap-3">
                                    <img src="${avatar}" class="w-9 h-9 rounded-full border object-cover p-0.5 cursor-pointer" onclick="openPublicProfile('${p.latestReposter?.uid}')">
                                    <div>
                                        <div class="font-bold text-sm flex items-center">${username} ${subHeader}</div>
                                        <div class="text-xs text-gray-500">Just now</div>
                                    </div>
                                </div>
                                <button class="text-gray-400"><i class="fas fa-ellipsis-h"></i></button>
                            </div>

                            <!-- Image -->
                            <div class="w-full bg-gray-100 dark:bg-black relative" ondblclick="toggleLike('${p.id}')">
                                <img src="${p.image}" class="w-full object-contain max-h-[500px] img-fade-in" onload="this.classList.add('img-loaded')">
                                <div id="heart-${p.id}" class="absolute inset-0 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
                                    <i class="fas fa-heart text-white text-6xl drop-shadow-lg"></i>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="p-3">
                                <div class="flex items-center gap-4 text-2xl mb-2">
                                    <button onclick="toggleLike('${p.id}')" class="transition-transform active:scale-125 ${isLiked ? 'text-red-500' : 'text-gray-800 dark:text-white hover:text-gray-600'}">
                                        <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                                    </button>
                                    <button class="text-gray-800 dark:text-white hover:text-gray-600"><i class="far fa-comment"></i></button>
                                    <button class="text-gray-800 dark:text-white hover:text-gray-600 ml-auto"><i class="far fa-bookmark"></i></button>
                                </div>
                                <div class="font-bold text-sm mb-1">${p.likes ? p.likes.length : 0} likes</div>
                                <div>
                                    <span class="font-bold text-sm mr-2">${username}</span>
                                    <span class="text-sm text-gray-800 dark:text-gray-200">${caption}</span>
                                </div>
                            </div>
                        </div>
                     `;
                 }).join('');
             });
        }
    };

    window.toggleLike = async (id) => {
        if(!currentUser) { signInWithPopup(auth, provider); return; }
        const ref = doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), id);
        const snap = await getDoc(ref);
        if(!snap.exists()) return;

        const likes = snap.data().likes || [];
        if(likes.includes(currentUser.uid)) {
            updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
        } else {
            // Show big heart animation
            const heartEl = document.getElementById(`heart-${id}`);
            if(heartEl) {
                heartEl.style.opacity = 1;
                heartEl.classList.add('heart-anim');
                setTimeout(() => { heartEl.style.opacity = 0; heartEl.classList.remove('heart-anim'); }, 800);
            }
            updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
        }
    };

    // --- CREATE POST (Compress + Upload) ---
    const createModal = document.getElementById('create-modal');
    const dropArea = document.getElementById('drop-area');
    const fileIn = document.getElementById('file-in');
    const previewImg = document.getElementById('preview-img');
    const shareBtn = document.getElementById('share-btn');
    let selectedFile = null;

    window.openCreatePostModal = () => {
        if(!currentUser) { signInWithPopup(auth, provider); return; }
        createModal.classList.remove('hidden');
        createModal.classList.add('flex');
    };
    window.closeCreatePostModal = () => {
        createModal.classList.add('hidden');
        createModal.classList.remove('flex');
        resetCreateForm();
    };

    dropArea.onclick = () => fileIn.click();
    fileIn.onchange = (e) => {
        if(e.target.files[0]) {
            selectedFile = e.target.files[0];
            previewImg.src = URL.createObjectURL(selectedFile);
            previewImg.classList.remove('hidden');
            document.getElementById('upload-ui').classList.add('hidden');
            shareBtn.disabled = false;
            shareBtn.classList.remove('opacity-50');
        }
    };

    shareBtn.onclick = async () => {
        if(!selectedFile) return;
        shareBtn.disabled = true; shareBtn.innerText = "Posting...";
        document.getElementById('progress-bar').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = "50%";

        try {
            // Compress Image
            const base64 = await compressImage(selectedFile);
            document.getElementById('progress-bar').style.width = "80%";

            // Upload
            const docId = `post_${Date.now()}_${currentUser.uid.slice(0,4)}`;
            await setDoc(doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), docId), {
                headline: document.getElementById('caption-in').value,
                image: base64,
                source: 'Community',
                reposters: [currentUser.uid],
                repostCount: 1,
                likes: [],
                timestamp: new Date().toISOString(),
                latestReposter: { username: currentUser.displayName, uid: currentUser.uid, avatar: currentUser.photoURL },
                isUserPost: true
            });

            document.getElementById('progress-bar').style.width = "100%";
            showToast("Shared Successfully!");
            closeCreatePostModal();
            switchView('community');

        } catch(e) { console.error(e); showToast("Error posting"); }
    };

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if(w > h && w > max) { h *= max/w; w=max; }
                    else if(h > max) { w *= max/h; h=max; }
                    cvs.width = w; cvs.height = h;
                    cvs.getContext('2d').drawImage(img,0,0,w,h);
                    resolve(cvs.toDataURL('image/jpeg', 0.7));
                }
            }
        });
    }

    function resetCreateForm() {
        selectedFile = null;
        previewImg.src = ""; previewImg.classList.add('hidden');
        document.getElementById('upload-ui').classList.remove('hidden');
        document.getElementById('caption-in').value = "";
        shareBtn.disabled = true; shareBtn.classList.add('opacity-50'); shareBtn.innerText = "Share";
        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('progress-bar').classList.add('hidden');
    }

    // --- PROFILE (Fixed Reposts) ---
    window.openProfile = () => {
        if(!currentUser) { signInWithPopup(auth, provider); return; }
        document.getElementById('profile-page').classList.add('open');
        switchProfileTab('reposts'); // Load reposts by default
    };

    window.switchProfileTab = (tab) => {
        const container = document.getElementById('p-reposts-grid');
        container.innerHTML = `<div class="col-span-3 py-10 text-center"><div class="inline-block w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>`;
        
        if(tab === 'reposts') {
            // Correct Query: Fetch where 'reposters' array contains current UID
            const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'), where('reposters', 'array-contains', currentUser.uid));
            
            getDocs(q).then(snap => {
                if(snap.empty) {
                    container.innerHTML = `<div class="col-span-3 text-center py-10 text-gray-400">No posts yet.</div>`; return;
                }
                const docs = snap.docs.map(d => d.data()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                container.innerHTML = docs.map(d => `
                    <div class="aspect-square bg-gray-100 relative group cursor-pointer border border-white">
                        <img src="${d.image}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/30 hidden group-hover:flex items-center justify-center text-white font-bold">
                            <i class="fas fa-heart mr-1"></i> ${d.likes ? d.likes.length : 0}
                        </div>
                    </div>
                `).join('');
            });
        } else {
            // Bookmarks placeholder logic
            container.innerHTML = `<div class="col-span-3 text-center py-10 text-gray-400">Bookmarks coming soon via Firestore sync.</div>`;
        }
    };

    // --- UTILS ---
    window.switchView = (v) => {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-community').classList.add('hidden');
        document.getElementById(`view-${v}`).classList.remove('hidden');
        if(v === 'community') loadCommunity();
        
        // Nav highlighting
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('text-blue-600'));
        document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('text-blue-600', 'active'));
    };

    window.closePage = (id) => document.getElementById(id).classList.remove('open');

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.querySelector('span').innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2500);
    }

    // Dark Mode
    const darkBtn = document.getElementById('dark-mode-toggle');
    darkBtn.onclick = () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

    fetchNews();
  </script>
</body>
</html>
