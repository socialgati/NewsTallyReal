<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indr.ai - The Next-Gen AI Assistant</title>
    <!-- Tailwind CSS CDN --><script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font --><link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1f2937;
        }
        /* The entire chat container is now full width and handles scrolling */
        .chat-container {
            height: calc(100vh - 12rem); 
            max-height: calc(100vh - 12rem);
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        /* New AI message styling: stretches full width of the viewport */
        .ai-response-block {
            width: 100vw;
            position: relative; 
            left: 50%;
            right: 50%;
            margin-left: -50vw; 
            margin-right: -50vw;
            
            background-color: #f8fafc; /* Subtle light gray background */
            border-top: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
            padding: 0.5rem 0; /* Vertical padding */
            margin-bottom: 1.5rem;
        }

        /* Container to center the AI content (text, icon) inside the full-width block */
        .ai-response-content-container {
            max-width: 48rem; /* max-w-3xl equivalent */
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem; /* Horizontal padding for mobile/desktop edges */
            display: flex;
            align-items: flex-start;
        }
        
        /* User message styling: remains centered and constrained */
        .user-message {
            background-color: #e0f2fe; /* Light Blue-100 */
            color: #1f2937;
            border-radius: 1.25rem 1.25rem 0.25rem 1.25rem;
            max-width: 90%;
            word-wrap: break-word;
            padding: 0.75rem 1rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        /* Wrapper for user messages to center them in the flow */
        .user-message-wrapper {
            max-width: 48rem; /* max-w-3xl equivalent */
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem; /* Horizontal padding for edges */
        }
        
        .ai-response-content-wrapper {
            padding-left: 1rem; 
            line-height: 1.6;
            width: 100%; /* Ensure it takes the remaining space next to the icon */
        }

        /* Custom Scrollbar */
        .chat-container::-webkit-scrollbar { width: 8px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #9ca3af; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-track { background-color: transparent; }

        /* Typing Indicator CSS - Blue */
        .dot {
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background-color: #1d4ed8; 
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .ai-response-content-wrapper pre {
            background-color: #e2e8f0; /* Slightly darker background for code */
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.75rem;
            font-size: 0.875rem;
            border: 1px solid #cbd5e1;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .file-input-hidden { display: none; }
        
        /* Indr.ai Symbol (replacing the generic AI icon) */
        .indrai-symbol {
            width: 2rem;
            height: 2rem;
            border-radius: 50%; /* Make it round */
            background-color: #2563eb; /* Blue background */
            color: white; /* Icon color */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Modal Styles for Modes Selector */
        .mode-overlay {
            position: fixed;
            bottom: 6rem; 
            right: 1.5rem;
            z-index: 50;
            transform: translateY(10px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
        }

        .mode-overlay.open {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .mode-button-item:hover {
            background-color: #f3f4f6;
            color: #1e40af; 
        }
    </style>
</head>
<body class="flex flex-col h-screen antialiased">

    <!-- Header --><header class="p-4 bg-white border-b border-gray-100 shadow-sm flex items-center justify-center sticky top-0 z-10">
        <div class="flex items-center space-x-2">
            <!-- Indr.ai Icon/Logo in Header --><svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1v-3.25M7 11h10M17 11V7a2 2 0 00-2-2H9a2 2 0 00-2 2v4m10 0v2m0 4h-2m-4 0h-4m2 0v2" />
            </svg>
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900">Indr.<span class="text-blue-600">ai</span></h1>
        </div>
    </header>

    <!-- Main Chat Area --><main class="flex-grow flex flex-col justify-start bg-gray-50">
        <div id="chat-container" class="chat-container w-full">
            <!-- Initial Welcome Message (wrapped in the new AI container structure) --><div class="ai-response-block">
                <div class="ai-response-content-container">
                    <div class="indrai-symbol">
                        <!-- Indr.ai Symbol SVG --><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-1-12h2v6h-2zm0 7h2v2h-2z"/>
                        </svg>
                    </div>
                    <div class="ai-response-content-wrapper">
                        <p class="font-bold text-blue-700 mb-2">Indr.ai (Search Mode)</p>
                        <div id="initial-message-content">
                            <p>Hello! I am Indr.ai, powered by Gemini. My **Search** mode uses Google to find up-to-date information. I prioritize grammatically flawless responses. Ask me anything!</p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Messages will be injected here --></div>
    </main>
    
    <!-- Modes Selector Overlay (Hidden by default) --><div id="mode-overlay" class="mode-overlay">
        <div class="bg-white p-2 rounded-xl shadow-2xl border border-gray-100 min-w-[10rem]">
            <button class="mode-button-item px-4 py-2 w-full text-left rounded-lg text-sm font-medium transition duration-150 text-blue-600" data-mode="search" onclick="setMode('search')">🌐 Search</button>
            <button class="mode-button-item px-4 py-2 w-full text-left rounded-lg text-sm font-medium transition duration-150 text-gray-700" data-mode="creative" onclick="setMode('creative')">✨ Creative</button>
            <button class="mode-button-item px-4 py-2 w-full text-left rounded-lg text-sm font-medium transition duration-150 text-gray-700" data-mode="code" onclick="setMode('code')">💻 Code</button>
        </div>
    </div>


    <!-- Input Area (Sticky Footer - Raised for mobile comfort) --><div class="p-6 pt-4 bg-white border-t border-gray-100 shadow-xl sticky bottom-0 z-20 flex justify-center">
        <div class="w-full max-w-3xl flex flex-col space-y-3">
            
            <!-- Image Preview Area --><div id="image-preview-container" class="hidden relative p-3 border border-gray-300 rounded-xl bg-gray-50 shadow-inner">
                <img id="image-preview" class="max-h-32 rounded-lg object-contain" src="" alt="Uploaded image preview">
                <button onclick="removeImage()" class="absolute top-1 right-1 p-1 bg-red-500 text-white rounded-full hover:bg-red-600 transition duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <span id="image-filename" class="text-xs text-gray-600 mt-2 block truncate w-40"></span>
            </div>

            <!-- Input Bar (The main interaction area) --><div class="flex items-end p-2 border border-gray-200 rounded-3xl shadow-md bg-white transition duration-300 hover:shadow-lg focus-within:shadow-lg focus-within:ring-1 focus-within:ring-blue-500">
                
                <!-- 1. Hamburger Menu (Modes Toggle) --><button onclick="toggleModeSelector()" 
                        class="p-2 w-10 h-10 flex-shrink-0 flex items-center justify-center text-gray-500 rounded-full hover:bg-gray-100 transition duration-200"
                        title="Select Mode">
                    <!-- Three-line dot / Hamburger Icon --><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <!-- 2. Plus Sign (Image Upload) --><input type="file" id="file-upload" class="file-input-hidden" accept="image/jpeg, image/png" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('file-upload').click()" 
                        class="p-2 w-10 h-10 flex-shrink-0 flex items-center justify-center text-gray-500 rounded-full hover:bg-gray-100 transition duration-200"
                        title="Upload Image">
                    <!-- Plus Sign Icon --><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m-8-8h16"></path></svg>
                </button>
                
                <!-- 3. Textarea --><textarea id="prompt-input" rows="1" class="flex-grow p-1 text-gray-700 bg-white border-none focus:ring-0 resize-none outline-none" placeholder="Enter your prompt here..."></textarea>
                
                <!-- 4. Send Button --><button id="send-button" onclick="sendMessage()" class="p-2 w-10 h-10 flex-shrink-0 flex items-center justify-center text-white bg-blue-600 rounded-full hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <!-- Send Icon SVG --><svg id="send-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Click handler to close modal when clicking outside --><div id="modal-backdrop" class="fixed inset-0 z-10 hidden" onclick="toggleModeSelector()"></div>

    <script>
        // Global Constants
        const API_KEY = "AIzaSyDStpVJpqJjfi8kdsGcYlBMfOD4ByKcagY"; // User provided API Key
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        const TYPING_DELAY = 15;
        
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendButton = document.getElementById('send-button');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const imageFilename = document.getElementById('image-filename');
        const modeOverlay = document.getElementById('mode-overlay');
        const modalBackdrop = document.getElementById('modal-backdrop');

        // State Variables
        let chatHistory = [];
        let isTyping = false;
        let currentMode = 'search';
        let uploadedFile = null;

        // --- Mode Configuration ---
        const MODE_CONFIGS = {
            search: {
                label: "Search",
                placeholder: "Ask me anything (powered by Google)...",
                instruction: "You are a world-class research assistant. Provide concise, accurate, and up-to-date answers. Use Google Search grounding. Ensure all your output is grammatically flawless and coherent.",
                tools: [{ "google_search": {} }],
            },
            creative: {
                label: "Creative",
                placeholder: "Write a poem, story, or script...",
                instruction: "You are a professional author and storyteller. Respond with imagination and flair, focusing on engaging and well-structured narratives. Ensure all your output is grammatically flawless and coherent.",
                tools: null,
            },
            code: {
                label: "Code",
                placeholder: "Ask for a code snippet, explain a concept, or debug...",
                instruction: "You are an expert software developer. Provide clear, well-commented, and efficient code snippets or technical explanations. Ensure all your output is grammatically flawless and coherent.",
                tools: null,
            }
        };

        // --- UI & Utility Functions ---

        /**
         * Toggles the visibility of the Mode Selector overlay.
         */
        function toggleModeSelector() {
            const isOpen = modeOverlay.classList.toggle('open');
            modalBackdrop.classList.toggle('hidden', !isOpen);
        }

        /**
         * Sets the current operating mode of the AI and updates the UI.
         */
        function setMode(mode) {
            currentMode = mode;
            const config = MODE_CONFIGS[mode];
            
            promptInput.placeholder = config.placeholder;
            
            document.querySelectorAll('.mode-button-item').forEach(btn => {
                const btnMode = btn.dataset.mode;
                if (btnMode === mode) {
                    btn.classList.add('text-blue-600', 'font-bold');
                    btn.classList.remove('text-gray-700', 'font-medium');
                } else {
                    btn.classList.remove('text-blue-600', 'font-bold');
                    btn.classList.add('text-gray-700', 'font-medium');
                }
            });
            
            toggleModeSelector();
            
            if (!isTyping) {
                 sendButton.disabled = promptInput.value.trim() === '';
            }
        }

        /**
         * Converts basic markdown (bold, lists, code blocks) to HTML.
         */
        function renderMarkdown(text) {
            let html = text;
            
            // 1. Handle code blocks (triple backticks)
            html = html.replace(/```(\w+)?\n([\s\S]*?)\n```/g, function(match, lang, code) {
                const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<pre><code>${escapedCode}</code></pre>`;
            });

            // 2. Convert double newlines to paragraphs
            html = html.replace(/\n\s*\n/g, '</p><p>'); 
            
            // 3. Convert single newlines to line breaks
            html = html.replace(/\n/g, '<br>');

            // 4. Simple bolding (**text**)
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // 5. Wrap in initial paragraph
            if (html.trim().length > 0 && !html.startsWith('<p>') && !html.startsWith('<pre>')) {
                 html = '<p>' + html + '</p>';
            }

            return html;
        }

        /** Simple auto-resizing for the textarea. */
        function resizeTextarea() {
            promptInput.style.height = 'auto';
            promptInput.style.height = promptInput.scrollHeight + 'px';
        }

        /** Scrolls the chat container to the bottom. */
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        /** Toggles the UI state for loading/sending. */
        function setUILoading(isLoading) {
            isTyping = isLoading;
            promptInput.disabled = isLoading;
            document.getElementById('file-upload').disabled = isLoading;
            sendButton.disabled = isLoading || (promptInput.value.trim() === '' && uploadedFile === null); 
        }

        /** Creates and appends the AI message structure. */
        function addModelMessageStructure() {
            const modeLabel = MODE_CONFIGS[currentMode].label;
            
            // 1. Full-width block that breaks out of the centered area
            const messageWrapper = document.createElement('div');
            messageWrapper.className = 'ai-response-block';

            // 2. Centered content container (max-w-3xl)
            const contentContainer = document.createElement('div');
            contentContainer.className = 'ai-response-content-container';
            
            // Indr.ai Symbol (SVG)
            const symbolDiv = document.createElement('div');
            symbolDiv.className = 'indrai-symbol';
            symbolDiv.innerHTML = `
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-1-12h2v6h-2zm0 7h2v2h-2z"/>
                </svg>
            `;
            contentContainer.appendChild(symbolDiv);
            
            // AI Response Content Wrapper
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'ai-response-content-wrapper';
            
            // Header (Screen reader only, but can be made visible for debugging/branding)
            const header = document.createElement('p');
            header.className = 'font-bold text-blue-700 mb-2 sr-only'; 
            header.textContent = `Indr.ai (${modeLabel})`;
            contentWrapper.appendChild(header);

            // Content Element (for dots/text)
            const contentElement = document.createElement('div');
            contentElement.className = 'ai-response-content';
            
            // Add typing dots initially
            contentElement.innerHTML = `
                <div class="dot-container flex space-x-1 items-center h-5">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            `;
            
            contentWrapper.appendChild(contentElement);
            contentContainer.appendChild(contentWrapper);
            messageWrapper.appendChild(contentContainer);
            chatContainer.appendChild(messageWrapper);
            scrollToBottom();

            return { contentElement };
        }

        /** Simulates fast typing of the response. */
        function simulateTyping(fullText, targetElement) {
            targetElement.innerHTML = ''; 

            let index = 0;
            const rawText = fullText.replace(/<br>/g, '\n').replace(/<[^>]*>?/gm, "");

            function type() {
                if (index < rawText.length) {
                    targetElement.textContent += rawText.charAt(index);
                    index++;
                    scrollToBottom();
                    setTimeout(type, TYPING_DELAY);
                } else {
                    targetElement.innerHTML = renderMarkdown(fullText);
                    setUILoading(false);
                }
            }
            type();
        }

        /** Implements exponential backoff for API retries. */
        const exponentialBackoff = async (attempt) => {
            const delay = Math.pow(2, attempt) * 1000 + Math.random() * 500;
            return new Promise(resolve => setTimeout(resolve, delay));
        };
        
        /** Handles image file selection and conversion to Base64. */
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) { 
                alert('File size exceeds 5MB. Please choose a smaller image.');
                removeImage();
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFile = {
                    base64: e.target.result.split(',')[1],
                    mimeType: file.type
                };
                
                imagePreview.src = e.target.result;
                imageFilename.textContent = file.name;
                imagePreviewContainer.classList.remove('hidden');
                sendButton.disabled = (promptInput.value.trim() === '' && uploadedFile === null);
                scrollToBottom();
            };
            reader.readAsDataURL(file);
        }

        /** Removes the uploaded image from the state and UI. */
        function removeImage() {
            uploadedFile = null;
            imagePreview.src = '';
            imageFilename.textContent = '';
            imagePreviewContainer.classList.add('hidden');
            document.getElementById('file-upload').value = null;
            sendButton.disabled = (promptInput.value.trim() === '' && uploadedFile === null);
        }

        // --- Core Application Logic ---

        /** Sends the user's message (and image, if available) to the Gemini API. */
        async function sendMessage() {
            const userQuery = promptInput.value.trim();
            if (!userQuery && !uploadedFile) return;
            if (isTyping) return;

            let currentContentParts = [];
            if (userQuery) { currentContentParts.push({ text: userQuery }); }
            
            if (uploadedFile) {
                currentContentParts.push({
                    inlineData: { mimeType: uploadedFile.mimeType, data: uploadedFile.base64 }
                });
            }

            // 2. Display User Message & Image Preview
            addMessageToChat(userQuery, 'user', uploadedFile);
            
            // 3. Clear input/image and update history/UI state
            promptInput.value = '';
            resizeTextarea();
            removeImage();
            setUILoading(true);
            
            chatHistory.push({ role: 'user', parts: currentContentParts });

            const config = MODE_CONFIGS[currentMode];
            
            const payload = {
                contents: chatHistory,
                ...(config.tools && { tools: config.tools }),
                systemInstruction: { parts: [{ text: config.instruction }] },
            };

            // 4. Add AI message structure with typing indicator
            const { contentElement } = addModelMessageStructure();
            
            let responseText = "Sorry, I encountered an issue and couldn't process your request. Please check your network connection and try again.";
            let success = false;
            let finalAttempt = 0;

            try {
                for (let attempt = 0; attempt < 5; attempt++) {
                    finalAttempt = attempt + 1;
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        const candidate = result.candidates?.[0];

                        if (candidate && candidate.content?.parts?.[0]?.text) {
                            responseText = candidate.content.parts[0].text;
                            success = true;
                            break; 
                        } else {
                            responseText = "I received an empty or unreadable response from the AI model.";
                            throw new Error('Invalid AI response structure');
                        }
                    } else if (response.status === 429 || response.status >= 500) {
                        await exponentialBackoff(attempt);
                    } else {
                        const errorBody = await response.json();
                        responseText = `Server Error (${response.status}): ${errorBody.error.message || response.statusText}`;
                        break;
                    }
                }
            } catch (error) {
                console.error(`AI call failed after ${finalAttempt} attempts:`, error);
            } finally {
                // 5. Display Model Message using typing simulation
                simulateTyping(responseText, contentElement);

                // 6. Update history (only if successful)
                if (success) {
                    chatHistory.push({ role: 'model', parts: [{ text: responseText }] });
                } else {
                    chatHistory.pop();
                }
            }
        }

        /** Adds a static message to the chat (used only for user messages). */
        function addMessageToChat(text, role, fileData) {
            const messageWrapper = document.createElement('div');
            
            messageWrapper.className = `user-message-wrapper mb-6 flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const messageDiv = document.createElement('div');
            messageDiv.className = `user-message flex flex-col space-y-3`;

            // Add Image Preview if present
            if (fileData) {
                const img = document.createElement('img');
                img.src = `data:${fileData.mimeType};base64,${fileData.base64}`;
                img.className = 'w-full max-h-48 object-cover rounded-lg shadow-md';
                messageDiv.appendChild(img);
            }

            // Add Text only if prompt exists
            if (text) {
                const textContent = document.createElement('div');
                textContent.innerHTML = renderMarkdown(text);
                messageDiv.appendChild(textContent);
            }
            
            messageWrapper.appendChild(messageDiv);
            chatContainer.appendChild(messageWrapper);
            scrollToBottom();
        }

        // --- Event Listeners and Initialization ---

        // Input change listener
        promptInput.addEventListener('input', () => {
            if (!isTyping) {
                sendButton.disabled = (promptInput.value.trim() === '' && uploadedFile === null);
            }
            resizeTextarea();
        });

        // Enter key listener
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendButton.disabled && !isTyping) {
                    sendMessage();
                }
            }
        });
        
        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            setMode('search'); // Initialize to Search mode
            sendButton.disabled = true; 
        });

    </script>
</body>
</html>
