<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile — Socialgati</title>
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/base.css">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<style>
.profile-header{background:var(--card);padding:20px 16px 0;border-bottom:1px solid var(--border)}
.profile-av{width:86px;height:86px;border-radius:50%;object-fit:cover;border:3px solid var(--border)}
.profile-stats{display:flex;gap:0;margin-top:16px;border-top:1px solid var(--border)}
.stat-item{flex:1;text-align:center;padding:12px 4px;cursor:pointer}
.stat-num{font-size:18px;font-weight:700;color:var(--ink);display:block}
.stat-lbl{font-size:12px;color:var(--muted)}
.profile-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:52px;z-index:10}
.ptab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:.15s}
.ptab.active{color:var(--sg);border-bottom-color:var(--sg)}
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.post-thumb{aspect-ratio:1;background:var(--card-2);overflow:hidden;cursor:pointer;position:relative}
.post-thumb img{width:100%;height:100%;object-fit:cover;transition:.15s}
.post-thumb:hover img{opacity:.85}
.post-thumb-text{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;font-size:11px;color:var(--muted);text-align:center;word-break:break-word}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.history-item:hover{background:var(--card-2)}
.history-item img{width:56px;height:42px;object-fit:cover;border-radius:6px;flex-shrink:0}
</style>
</head><body>
<header class="app-header">
  <div class="app-header-inner">
    <button class="icon-btn" onclick="history.length>1?history.back():location.href='/'"><i class="fas fa-arrow-left"></i></button>
    <span id="header-username" style="font-size:16px;font-weight:700;color:var(--ink);flex:1;text-align:center"></span>
    <button class="icon-btn" onclick="toggleDarkMode()"><i id="theme-icon" class="fas fa-moon"></i></button>
    <button class="icon-btn" id="profile-more-btn" onclick="showProfileMenu()"><i class="fas fa-ellipsis-vertical"></i></button>
  </div>
</header>

<div style="padding-top:52px">
  <!-- PROFILE HEADER -->
  <div class="profile-header">
    <div style="display:flex;align-items:flex-start;gap:20px;margin-bottom:14px">
      <img id="p-avatar" src="https://ui-avatars.com/api/?name=U" class="profile-av">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <h2 id="p-name" style="font-size:18px;font-weight:700"></h2>
          <span id="p-verified" style="display:none;color:var(--sg)"><i class="fas fa-circle-check"></i></span>
        </div>
        <p id="p-username" style="font-size:14px;color:var(--muted);margin-bottom:10px"></p>
        <div id="p-action-area"></div>
      </div>
    </div>
    <p id="p-bio" style="font-size:14px;color:var(--ink);margin-bottom:4px;line-height:1.5"></p>
    <div class="profile-stats">
      <div class="stat-item" id="posts-stat"><span class="stat-num" id="p-posts-count">0</span><span class="stat-lbl">Posts</span></div>
      <div class="stat-item" id="followers-stat" onclick="location.href='/pages/followers.html?u='+currentUID"><span class="stat-num" id="p-followers">0</span><span class="stat-lbl">Followers</span></div>
      <div class="stat-item" id="following-stat" onclick="location.href='/pages/following.html?u='+currentUID"><span class="stat-num" id="p-following">0</span><span class="stat-lbl">Following</span></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="profile-tabs">
    <div class="ptab active" onclick="switchTab('posts',this)"><i class="fas fa-th"></i></div>
    <div class="ptab" onclick="switchTab('saved',this)"><i class="far fa-bookmark"></i></div>
    <div class="ptab" onclick="switchTab('history',this)"><i class="fas fa-history"></i></div>
  </div>

  <div id="tab-posts" class="posts-grid"></div>
  <div id="tab-saved" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
</div>

<nav class="bottom-nav">
  <a href="/" class="nav-btn"><i class="fas fa-bolt"></i><span>Socialgati</span></a>
  <a href="/newstally.html" class="nav-btn"><i class="far fa-newspaper"></i><span>NewsTally</span></a>
  <div class="nav-compose-wrap"><button class="nav-compose-btn" onclick="openComposePost()"><i class="fas fa-pen"></i></button></div>
  <a href="/pages/notifications.html" class="nav-btn"><i class="far fa-bell"></i><span>Alerts</span></a>
  <a href="/pages/profile.html" class="nav-btn active"><i class="fas fa-user"></i><span>Profile</span></a>
</nav>
<div id="toast"><span></span></div>

<script type="module">
import { auth, db, doc, getDoc, getDocs, collection, query, where, orderBy, limit,
         onAuthStateChanged, arrayUnion, arrayRemove, updateDoc, serverTimestamp } from '/js/firebase.js';
import { initAuth, currentUser, openAuthModal } from '/js/auth.js';
import { showToast, formatTimestamp, formatDate, toggleDarkMode, initTheme } from '/js/utils.js';

const APP_ID = 'newstally-social';
const params = new URLSearchParams(location.search);
const profileUsername = params.get('u') || '';
let profileUID = params.get('uid') || '';
let currentUID = '';

window.toggleDarkMode = toggleDarkMode;
window.openComposePost = () => { if(!currentUser) return openAuthModal(); location.href='/pages/create-post.html'; };
window.currentUID = '';

initTheme();
initAuth(async (user) => {
  currentUID = user.uid;
  window.currentUID = user.uid;
  if (!profileUID && !profileUsername) {
    // Show own profile
    profileUID = user.uid;
  }
  await loadProfile(profileUID, profileUsername);
}, () => {
  if (!profileUID && !profileUsername) location.href = '/';
  else loadProfile(profileUID, profileUsername);
});

async function loadProfile(uid, username) {
  let snap = null;
  if (uid) {
    snap = await getDoc(doc(db, 'users', uid)).catch(()=>null);
  } else if (username) {
    // Find by username
    const q = query(collection(db, 'users'), where('username','==',username), limit(1));
    const s = await getDocs(q).catch(()=>null);
    if (s && !s.empty) { snap = s.docs[0]; uid = s.docs[0].id; }
  }

  if (!snap || !snap.exists()) {
    document.getElementById('p-name').textContent = 'User not found';
    return;
  }

  const d = snap.data();
  profileUID = uid;
  document.getElementById('header-username').textContent = d.username ? '@'+d.username : d.displayName || 'User';
  document.getElementById('p-avatar').src = d.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(d.displayName||'U')}&background=random`;
  document.getElementById('p-name').textContent = d.displayName || 'User';
  document.getElementById('p-username').textContent = d.username ? '@'+d.username : '';
  document.getElementById('p-bio').textContent = d.bio || '';
  document.getElementById('p-followers').textContent = d.followersCount || 0;
  document.getElementById('p-following').textContent = d.followingCount || 0;

  const isOwn = currentUser && currentUser.uid === uid;
  const actionArea = document.getElementById('p-action-area');
  if (isOwn) {
    actionArea.innerHTML = `<a href="/pages/edit-profile.html" class="btn-outline" style="font-size:13px;padding:6px 16px">Edit Profile</a>
    <button class="btn-outline" style="margin-left:8px;font-size:13px;padding:6px 16px" onclick="location.href='/pages/settings.html'">Settings</button>`;
  } else if (currentUser) {
    const isFollowing = (d.followers||[]).includes(currentUser.uid);
    actionArea.innerHTML = `<button id="follow-btn" class="btn-follow ${isFollowing?'following':''}" onclick="toggleFollow('${uid}',${isFollowing})">${isFollowing?'Following':'Follow'}</button>`;
  } else {
    actionArea.innerHTML = `<button class="btn-follow" onclick="openAuthModal()">Follow</button>`;
  }

  // Load posts
  const rSnap = await getDocs(query(
    collection(db, 'artifacts', APP_ID, 'public', 'data', 'reposts'),
    where('userId','==',uid), orderBy('timestamp','desc'), limit(30)
  )).catch(()=>null);

  document.getElementById('p-posts-count').textContent = rSnap?.size || 0;
  const postsGrid = document.getElementById('tab-posts');
  if (rSnap && !rSnap.empty) {
    postsGrid.innerHTML = rSnap.docs.map(d => {
      const p = d.data();
      const thumb = p.image
        ? `<img src="${p.image}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="post-thumb-text">${(p.headline||'').substring(0,50)}</div>`;
      return `<div class="post-thumb" onclick="location.href='/pages/post.html?id=${d.id}'">${thumb}</div>`;
    }).join('');
  } else {
    postsGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)"><i class="fas fa-bolt" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>No posts yet</div>`;
  }

  // Saved tab (own profile only)
  if (isOwn) {
    const savedIds = d.savedPosts || [];
    const savedTab = document.getElementById('tab-saved');
    if (savedIds.length === 0) {
      savedTab.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)"><i class="far fa-bookmark" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>No saved posts</div>`;
    } else {
      savedTab.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">${savedIds.length} saved posts</div>
      <a href="/pages/saved.html" class="btn-primary" style="display:block;width:fit-content;margin:0 auto">View All Saved</a>`;
    }
    // History tab
    const hist = JSON.parse(localStorage.getItem('nt_history') || '[]');
    const histTab = document.getElementById('tab-history');
    if (hist.length === 0) {
      histTab.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)"><i class="fas fa-history" style="font-size:32px;display:block;margin-bottom:8px;opacity:.3"></i>No reading history yet</div>`;
    } else {
      histTab.innerHTML = hist.slice(0,20).map(h => `
        <div class="history-item" onclick="location.href='/pages/news-detail.html?id=${h.id}'">
          <img src="${h.image||''}" onerror="this.style.display='none'" alt="">
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${h.title}</p>
            <p style="font-size:11px;color:var(--muted);margin-top:3px">${h.category||''} · ${new Date(h.ts||0).toLocaleDateString()}</p>
          </div>
          <i class="fas fa-chevron-right" style="color:var(--border);font-size:12px"></i>
        </div>`).join('');
    }
  }
}

window.switchTab = (tab, btn) => {
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['posts','saved','history'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (el) el.style.display = t===tab ? '' : 'none';
  });
};

window.toggleFollow = async (uid, isFollowing) => {
  if (!currentUser) return openAuthModal();
  const targetRef = doc(db, 'users', uid);
  const myRef = doc(db, 'users', currentUser.uid);
  await Promise.all([
    updateDoc(targetRef, { followers: isFollowing?arrayRemove(currentUser.uid):arrayUnion(currentUser.uid), followersCount: isFollowing?-1:1 }),
    updateDoc(myRef, { following: isFollowing?arrayRemove(uid):arrayUnion(uid), followingCount: isFollowing?-1:1 })
  ]).catch(()=>{});
  const btn = document.getElementById('follow-btn');
  if (btn) { btn.textContent = isFollowing?'Follow':'Following'; btn.classList.toggle('following',!isFollowing); btn.onclick = ()=>toggleFollow(uid,!isFollowing); }
  showToast(isFollowing ? 'Unfollowed' : 'Following!');
};

window.showProfileMenu = () => {
  if (!currentUser) return;
  const isOwn = currentUser.uid === profileUID;
  if (isOwn) {
    if (confirm('Sign out?')) { import('/js/auth.js').then(({doLogout})=>doLogout()); }
  }
};
</script>
</body></html>
