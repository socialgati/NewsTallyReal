<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ledger Elite | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2563eb; --slate-dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; color: #1e293b; line-height: 1.8; }
        .serif { font-family: 'Lora', serif; }
        
        .article-container {
            max-width: 880px;
            margin: 2rem auto;
            background: #fff;
            padding: 4.5rem 5.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
        }

        @media (max-width: 768px) { .article-container { padding: 2rem 1.5rem; border-radius: 0; margin: 0; } }

        /* Typography */
        .article-body h1 { font-family: 'Lora', serif; font-size: 3.25rem; font-weight: 800; line-height: 1.15; margin-bottom: 2.5rem; color: #000; text-align: center; letter-spacing: -0.03em; }
        .article-body h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.65rem; font-weight: 700; margin: 3rem 0 1.25rem; color: #111827; border-left: 5px solid var(--accent); padding-left: 1.25rem; }
        .article-body p { font-size: 1.15rem; margin-bottom: 1.75rem; color: #374151; text-align: justify; }

        /* Important Points */
        .article-body strong, .article-body b { font-weight: 800; color: #000; }

        /* Stats Tables */
        .article-body table { width: 100%; border-collapse: collapse; margin: 2.5rem 0; font-size: 0.95rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .article-body th { text-align: left; padding: 14px 20px; background: #f8fafc; color: #1e293b; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; border-bottom: 2px solid #e2e8f0; }
        .article-body td { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; color: #475569; }
        .article-body tr:nth-child(even) { background-color: #fbfcfe; }

        .brief-box { background: #111827; color: #fff; padding: 2.5rem; border-radius: 12px; margin-bottom: 4rem; border-left: 6px solid var(--accent); }
        
        .loader-track { height: 4px; width: 100%; background: #e2e8f0; position: relative; overflow: hidden; border-radius: 10px; }
        .loader-fill { height: 100%; background: var(--accent); position: absolute; animation: load-run 1.5s infinite ease-in-out; }
        @keyframes load-run { 0% { left: -40%; width: 40%; } 100% { left: 100%; width: 40%; } }

        .btn-black { background: #000; color: #fff; transition: all 0.3s ease; }
        .btn-black:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-black:disabled { opacity: 0.4; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-100 py-5 px-10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-black flex items-center justify-center rounded-lg text-white font-bold text-xl">L</div>
                <span class="serif text-2xl font-bold tracking-tighter">THE LEDGER</span>
            </div>
            <div class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400">Elite News Suite</div>
        </div>
    </nav>

    <main class="py-16 px-6">
        <div class="max-w-2xl mx-auto mb-20 text-center">
            <h1 class="serif text-6xl font-extrabold mb-6 tracking-tight text-slate-900">Digital Editorial</h1>
            <p class="text-slate-500 text-xl font-light mb-10">Generate publish-ready news articles with real-time global statistics.</p>
            
            <div class="flex flex-col sm:flex-row gap-3 bg-white p-2.5 rounded-2xl shadow-xl border border-slate-100">
                <input type="text" id="topicInput" placeholder="Enter topic for reporting..." class="flex-1 px-6 py-4 focus:outline-none text-xl bg-transparent">
                <button onclick="publishArticle()" id="pubBtn" class="btn-black px-12 py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                    <span id="btnText">Publish</span>
                    <i id="btnIcon" class="fas fa-feather-pointed"></i>
                </button>
            </div>
        </div>

        <div id="loader" class="hidden max-w-xl mx-auto mb-20 text-center">
            <div class="loader-track mb-5"><div class="loader-fill"></div></div>
            <p id="statusMsg" class="text-[11px] font-black uppercase tracking-[0.4em] text-blue-600">Gathering Intelligence...</p>
        </div>

        <div id="errorDisplay" class="hidden max-w-xl mx-auto mb-20 p-8 bg-red-50 border border-red-100 rounded-2xl text-center">
            <h4 class="font-bold text-red-800 text-xl mb-2">Error</h4>
            <p id="errorMsg" class="text-red-600 text-sm"></p>
        </div>

        <div id="resultArea" class="hidden">
            <div class="article-container">
                <header class="mb-16 text-center">
                    <div class="text-[11px] font-black uppercase tracking-[0.4em] text-blue-600 mb-6">
                        <span id="pDate"></span> &bull; OFFICIAL REPORT
                    </div>
                    <div id="headlineZone" class="article-body"></div>
                </header>

                <div class="brief-box">
                    <p id="summaryZone" class="text-xl font-medium italic leading-relaxed opacity-95"></p>
                </div>

                <div id="bodyZone" class="article-body"></div>

                <footer class="mt-24 pt-12 border-t border-slate-100">
                    <h5 class="text-[10px] font-black uppercase text-slate-400 mb-8 tracking-widest text-center">Verified Data Sources</h5>
                    <div id="sourcesZone" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
                </footer>
            </div>
        </div>
    </main>

    <script>
        // --- 1. APNI KEYS YAHAN DALEIN ---
        const TAVILY_KEY = "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";
        const apiKey = "AIzaSyDP5c5PEtZXqt95BbEcfWkFZK_yFBQvHWw"; // Yahan Gemini Key rahegi

        async function publishArticle() {
            const topic = document.getElementById('topicInput').value.trim();
            if(!topic) return;

            const btn = document.getElementById('pubBtn');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('statusMsg');
            const errorDisplay = document.getElementById('errorDisplay');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            loader.classList.remove('hidden');
            errorDisplay.classList.add('hidden');
            resultArea.classList.add('hidden');

            try {
                // 1. Tavily Search
                statusMsg.innerText = "Accessing live news databases...";
                const sRes = await fetch('https://api.tavily.com/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: TAVILY_KEY, query: topic, search_depth: "advanced", max_results: 6 })
                });
                const sData = await sRes.json();
                if (!sData.results?.length) throw new Error("No data found.");

                // 2. Gemini Synthesis (Stable v1 Endpoint)
                statusMsg.innerText = "Compiling statistics & editorial text...";
                const context = sData.results.map(r => `Title: ${r.title}\nInfo: ${r.content}`).join('\n\n');
                
                // Using stable 'v1' and 'gemini-1.5-flash' for production stability
                const gUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const prompt = `Write an elite news report on: ${topic}. Context: ${context}.
                1. If statistics exist, you MUST use HTML <table> tags.
                2. Return ONLY a JSON object with keys: "headline", "summary", "body". 
                3. Body should use <h2>, <p>, <table> and sparse <strong> tags.`;

                const gRes = await fetch(gUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7 }
                    })
                });

                if (!gRes.ok) {
                    const errInfo = await gRes.json();
                    throw new Error(errInfo.error?.message || "AI Error");
                }

                const gData = await gRes.json();
                const rawText = gData.candidates[0].content.parts[0].text;
                
                // Robust JSON Parsing
                const cleanJson = rawText.replace(/```json|```/gi, '').trim();
                const content = JSON.parse(cleanJson);

                // 3. UI Update
                document.getElementById('pDate').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                document.getElementById('headlineZone').innerHTML = `<h1>${content.headline}</h1>`;
                document.getElementById('summaryZone').innerText = content.summary;
                document.getElementById('bodyZone').innerHTML = content.body;

                document.getElementById('sourcesZone').innerHTML = sData.results.map(s => `
                    <a href="${s.url}" target="_blank" class="p-5 border border-slate-100 rounded-2xl hover:bg-blue-50 transition-all flex justify-between items-center group bg-white">
                        <div class="overflow-hidden">
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${new URL(s.url).hostname}</span>
                            <p class="text-sm font-bold text-slate-800 line-clamp-1 mt-1">${s.title}</p>
                        </div>
                        <i class="fas fa-external-link-alt text-[10px] text-slate-200 group-hover:text-blue-600"></i>
                    </a>`).join('');

                resultArea.classList.remove('hidden');
                window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                document.getElementById('errorMsg').innerText = err.message;
                errorDisplay.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

```
