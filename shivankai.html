    <script>
        // API CONFIGURATION
        const TAVILY_KEY = "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";
        
        /*  WEBSITE USERS: Replace "" with your actual key like "AIza..."
         * CANVAS PREVIEW: Leave it as "" for the environment to inject the key.
         */
        const apiKey = ""; 

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 429) throw new Error("Rate limit exceeded.");
                    if (!response.ok) throw new Error(“HTTP Error: ${response.status}”);
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
        }

        async function startPublishing() {
            const topic = document.getElementById('topicInput').value.trim();
            if(!topic) return;

            // UI Reset
            const btn = document.getElementById('pubBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('statusMsg');
            const errorBox = document.getElementById('errorBox');
            const resultZone = document.getElementById('articleResult');

            btn.disabled = true;
            btnText.innerText = "Analyzing...";
            btnIcon.className = "fas fa-circle-notch fa-spin";
            loader.classList.remove('hidden');
            errorBox.classList.add('hidden');
            resultZone.classList.add('hidden');

            try {
                // 1. Tavily Search Call
                statusMsg.innerText = "Accessing real-time data nodes...";
                const searchRes = await fetch('https://api.tavily.com/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: TAVILY_KEY,
                        query: topic,
                        search_depth: "advanced",
                        max_results: 6
                    })
                });
                
                if (!searchRes.ok) throw new Error("Tavily API failed. Check your Tavily key.");
                const sData = await searchRes.json();
                if (!sData.results?.length) throw new Error("No live news found for this topic.");

                // 2. Gemini Synthesis Call
                statusMsg.innerText = "Synthesizing professional report & stats...";
                const context = sData.results.map(r => “Source: ${r.title}\nInfo: ${r.content}”).join('\n\n');

                const prompt = `
                    Write an elite news report. Topic: ${topic}. Context: ${context}.
                    
                    MANDATORY RULES:
                    1. Use sophisticated English.
                    2. If statistics, rankings, or match scores are available, you MUST create an HTML <table>.
                    3. Return ONLY a JSON object:
                    {
                        "headline": "Sharp Professional Headline",
                        "summary": "2-sentence executive summary",
                        "body": "Article in HTML using <h2>, <p>, <table>, <thead>, <tbody>, <tr>, <th>, <td>. Bold <strong> key data."
                    }
                `;

                const gUrl = “https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}”;
                
                const gData = await fetchWithRetry(gUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                    })
                });

                if (!gData.candidates?.[0]?.content?.parts?.[0]?.text) {
                    throw new Error("Gemini failed to generate content.");
                }

                const content = JSON.parse(gData.candidates[0].content.parts[0].text);

                // 3. Render
                renderArticle(content, sData.results);

            } catch (err) {
                console.error(err);
                document.getElementById('errorDetails').innerText = err.message;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.innerText = "Publish";
                btnIcon.className = "fas fa-feather";
                loader.classList.add('hidden');
            }
        }

        function renderArticle(data, sources) {
            document.getElementById('pubDate').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            document.getElementById('headlineZone').innerHTML = “<h1>${data.headline}</h1>”;
            document.getElementById('summaryText').innerText = data.summary;
            document.getElementById('contentZone').innerHTML = data.body;

            const container = document.getElementById('sourcesContainer');
            container.innerHTML = sources.map(s => `
                <a href="${s.url}" target="_blank" class="p-4 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all flex justify-between items-center group">
                    <div class="overflow-hidden">
                        <span class="text-[9px] font-black text-blue-600 uppercase tracking-tighter">${new URL(s.url).hostname}</span>
                        <p class="text-xs font-bold text-slate-800 line-clamp-1">${s.title}</p>
                    </div>
                    <i class="fas fa-external-link-alt text-[10px] text-slate-200 group-hover:text-black"></i>
                </a>
            `).join('');

            document.getElementById('articleResult').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('articleResult').offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
