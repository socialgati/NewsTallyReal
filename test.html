<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NewsTally — Firebase Test</title>
<meta name="theme-color" content="#1a73e8">
<link rel="icon" href="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif;background:#f8f9fa;color:#202124;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.ld-logo{width:72px;height:72px;border-radius:50%;overflow:hidden;box-shadow:0 4px 20px rgba(26,115,232,.3)}
.ld-logo img{width:100%;height:100%;object-fit:cover}
.ld-name{font-size:26px;font-weight:700;background:linear-gradient(135deg,#1a73e8,#1557b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-bar{width:220px;height:3px;background:#e8eaed;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:#1a73e8;border-radius:2px;animation:ldAnim 1.5s ease-in-out infinite}
@keyframes ldAnim{0%{width:0}60%{width:80%}100%{width:100%}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ld-msg{font-size:13px;color:#5f6368;font-family:monospace}

/* ===== HEADER ===== */
header{position:sticky;top:0;z-index:100;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 16px;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.hdr-logo img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.hdr-logo-text{font-size:20px;font-weight:700;color:#1a73e8;letter-spacing:-.3px}
.hdr-search{flex:1;max-width:500px;margin:0 auto;position:relative}
.hdr-search input{width:100%;padding:8px 36px 8px 14px;border:1px solid #e8eaed;border-radius:24px;font-size:14px;background:#f8f9fa;outline:none;transition:all .2s;font-family:inherit}
.hdr-search input:focus{border-color:#1a73e8;background:#fff;box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.hdr-search .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#9aa0a6;font-size:14px;cursor:pointer}
.hdr-search .clear-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#9aa0a6;font-size:13px;cursor:pointer;display:none}
.hdr-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.hdr-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#5f6368;transition:all .2s}
.hdr-btn:hover{background:#f1f3f4;color:#202124}

/* ===== MAIN LAYOUT ===== */
.main{max-width:1200px;margin:0 auto;padding:16px}
@media(min-width:768px){.main{padding:24px}}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#e8f0fe;border-radius:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-item{font-size:13px;color:#1a73e8;font-weight:600;display:flex;align-items:center;gap:5px}
.stat-item i{font-size:14px}
.stat-divider{width:1px;height:16px;background:#aecbfa}

/* ===== CATEGORY FILTER ===== */
.filter-wrap{overflow-x:auto;white-space:nowrap;scrollbar-width:none;padding-bottom:4px;margin-bottom:20px}
.filter-wrap::-webkit-scrollbar{display:none}
.cat-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid #e8eaed;color:#5f6368;margin-right:8px;transition:all .18s;cursor:pointer;white-space:nowrap}
.cat-btn:hover{border-color:#1a73e8;color:#1a73e8}
.cat-btn.active{background:#1a73e8;border-color:#1a73e8;color:#fff}

/* ===== SORT & COUNT ===== */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.list-count{font-size:14px;color:#5f6368;font-weight:500}
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-label{font-size:13px;color:#5f6368}
.sort-select{font-size:13px;padding:5px 10px;border:1px solid #e8eaed;border-radius:8px;background:#fff;color:#202124;cursor:pointer;font-family:inherit;outline:none}

/* ===== NEWS GRID ===== */
.news-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:600px){.news-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.news-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.news-grid{grid-template-columns:repeat(4,1fr)}}

/* ===== NEWS CARD ===== */
.news-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e8eaed;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.news-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#d2e3fc}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#f1f3f4;display:block}
.card-img-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1a73e8,#1557b0);display:flex;align-items:center;justify-content:center}
.card-img-placeholder img{width:48px;height:48px;border-radius:50%;opacity:.5}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#1a73e8}
.card-title{font-size:14px;font-weight:600;line-height:1.45;color:#202124;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-desc{font-size:12px;color:#5f6368;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.card-source{font-size:11px;color:#9aa0a6;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.card-date{font-size:11px;color:#9aa0a6}
.card-actions{display:flex;gap:6px;padding:8px 12px;border-top:1px solid #f1f3f4}
.card-act{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px;border-radius:8px;font-size:12px;font-weight:600;color:#5f6368;transition:all .15s}
.card-act:hover{background:#f1f3f4;color:#202124}
.card-act.saved{color:#1a73e8}
.card-act i{font-size:13px}

/* ===== ARTICLE DETAIL ===== */
#article-view{display:none;position:fixed;inset:0;z-index:200;background:#fff;overflow-y:auto}
.art-header{position:sticky;top:0;z-index:10;height:56px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 14px;gap:10px}
.art-back{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#202124;font-size:18px;flex-shrink:0;transition:background .15s}
.art-back:hover{background:#f1f3f4}
.art-header-cat{font-size:13px;font-weight:700;color:#1a73e8;flex:1}
.art-header-actions{display:flex;gap:4px}
.art-icon-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#5f6368;transition:all .15s}
.art-icon-btn:hover{background:#f1f3f4;color:#202124}
.art-progress{height:3px;background:#e8eaed;position:sticky;top:56px;z-index:9}
.art-progress-fill{height:100%;background:linear-gradient(90deg,#1a73e8,#34a853);width:0;transition:width .1s}
.art-content{max-width:780px;margin:0 auto;padding-bottom:60px}
.art-hero{width:100%;aspect-ratio:16/9;overflow:hidden;background:#f1f3f4;position:relative}
.art-hero img{width:100%;height:100%;object-fit:cover}
.art-hero-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a73e8,#1557b0)}
.art-hero-fb img{width:80px;height:80px;border-radius:50%;opacity:.6}
.art-body{padding:20px 16px}
.art-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.art-cat-badge{background:#e8f0fe;color:#1a73e8;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:99px}
.art-rt{font-size:12px;color:#5f6368;display:flex;align-items:center;gap:4px}
h1.art-title{font-size:clamp(20px,4.5vw,28px);font-weight:700;line-height:1.4;color:#202124;margin-bottom:16px;letter-spacing:-.3px}
.art-src-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#f8f9fa;border-radius:10px;border-left:3px solid #1a73e8;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.art-src-name{font-size:13px;font-weight:700;color:#202124}
.art-src-date{font-size:11px;color:#5f6368;margin-top:2px}
.art-btns{display:flex;gap:8px;flex-wrap:wrap}
.art-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;background:#fff;border:1px solid #e8eaed;font-size:12px;font-weight:600;color:#3c4043;transition:all .15s;cursor:pointer}
.art-btn:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
.art-btn.saved{background:#e8f0fe;border-color:#aecbfa;color:#1a73e8}
.art-text{font-size:16px;line-height:1.8;color:#3c4043;margin-bottom:24px}
.art-text p{margin-bottom:14px}
.art-nc{padding:24px;text-align:center;background:#f8f9fa;border-radius:12px;margin-bottom:20px}
.art-nc i{font-size:28px;color:#dadce0;display:block;margin-bottom:10px}
.art-nc p{font-size:14px;color:#5f6368;line-height:1.6}
.art-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.art-tag{font-size:12px;font-weight:600;color:#1a73e8;background:#e8f0fe;padding:4px 12px;border-radius:99px;cursor:pointer}
.art-tag:hover{background:#d2e3fc}
.art-share-row{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0;border-top:1px solid #e8eaed;margin-bottom:8px}
.sh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.sh-wa{background:#25d366;color:#fff}.sh-wa:hover{background:#1ebe5d}
.sh-tw{background:#000;color:#fff}.sh-tw:hover{background:#333}
.sh-tg{background:#0088cc;color:#fff}
.sh-cp{background:#f1f3f4;color:#3c4043}.sh-cp:hover{background:#e8eaed}

/* ===== RELATED ===== */
.related-wrap{padding:0 16px 20px}
.related-title{font-size:16px;font-weight:700;color:#202124;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.related-title::before{content:'';width:4px;height:20px;background:#1a73e8;border-radius:2px;display:inline-block}
.rel-card{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f3f4;cursor:pointer;transition:opacity .15s}
.rel-card:last-child{border-bottom:none}
.rel-card:hover{opacity:.75}
.rel-card img{width:80px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f1f3f4}
.rel-body{flex:1;min-width:0}
.rel-cat{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.rel-title{font-size:13px;font-weight:600;color:#202124;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rel-src{font-size:11px;color:#9aa0a6;margin-top:4px}

/* ===== EMPTY / ERROR ===== */
.empty-state{text-align:center;padding:60px 20px;color:#9aa0a6}
.empty-state i{font-size:48px;display:block;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:16px;font-weight:600;margin-bottom:8px;color:#5f6368}
.empty-state small{font-size:13px}

/* ===== LOAD MORE ===== */
.load-more-wrap{text-align:center;padding:24px 0}
.load-more-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;background:#1a73e8;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.load-more-btn:hover{background:#1557b0;transform:translateY(-1px)}
.load-more-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1}

/* ===== DARK MODE ===== */
html.dark body{background:#111118;color:#e8eaed}
html.dark header{background:rgba(17,17,24,.97);border-bottom-color:#2e2e3e}
html.dark #loading{background:#111118}
html.dark .news-card{background:#1c1c26;border-color:#2e2e3e}
html.dark .news-card:hover{border-color:#3c4043}
html.dark .card-title{color:#e8eaed}
html.dark .card-desc{color:#9aa0a6}
html.dark .card-actions{border-top-color:#2e2e3e}
html.dark .cat-btn{background:#1c1c26;border-color:#2e2e3e;color:#9aa0a6}
html.dark .cat-btn.active{background:#1a73e8;color:#fff}
html.dark .stats-bar{background:#1a2a4a}
html.dark .hdr-search input{background:#1c1c26;border-color:#2e2e3e;color:#e8eaed}
html.dark #article-view{background:#111118}
html.dark .art-header{background:rgba(17,17,24,.97);border-bottom-color:#2e2e3e}
html.dark h1.art-title{color:#e8eaed}
html.dark .art-src-bar,.art-nc{background:#1c1c26}
html.dark .art-src-name{color:#e8eaed}
html.dark .art-text{color:#bdc1c6}
html.dark .art-btn{background:#1c1c26;border-color:#2e2e3e;color:#9aa0a6}
html.dark .art-share-row{border-top-color:#2e2e3e}
html.dark .sh-cp{background:#2e2e3e;color:#e8eaed}
html.dark .rel-title{color:#e8eaed}
html.dark .rel-card{border-bottom-color:#2e2e3e}
html.dark .sort-select{background:#1c1c26;border-color:#2e2e3e;color:#e8eaed}
html.dark .card-img-placeholder{background:linear-gradient(135deg,#1a2a4a,#1557b0)}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld-logo"><img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally"></div>
  <div class="ld-name">NewsTally</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-msg" id="ld-msg">Connecting to Firebase...</div>
</div>

<!-- HEADER -->
<header>
  <div class="hdr-logo" onclick="backToFeed()">
    <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally">
    <span class="hdr-logo-text">NewsTally</span>
  </div>
  <div class="hdr-search">
    <input type="text" id="search-input" placeholder="Search news..." oninput="handleSearch(this.value)" onkeydown="if(event.key==='Enter')handleSearch(this.value)">
    <i class="fas fa-search search-icon" id="search-icon" onclick="triggerSearch()"></i>
    <i class="fas fa-times clear-icon" id="clear-icon" onclick="clearSearch()"></i>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" onclick="toggleDark()" id="dark-btn" title="Toggle dark mode">
      <i class="fas fa-moon" id="dark-icon"></i>
    </button>
  </div>
</header>

<!-- MAIN FEED -->
<div class="main" id="feed-view">

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><i class="fas fa-database"></i> <span id="stat-total">0</span> articles</div>
    <div class="stat-divider"></div>
    <div class="stat-item"><i class="fas fa-fire"></i> <span id="stat-cat">All categories</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><i class="fas fa-clock"></i> <span id="stat-time">Loading...</span></div>
  </div>

  <!-- Category filter -->
  <div class="filter-wrap" id="filter-wrap">
    <button class="cat-btn active" onclick="filterCat('All',this)">All</button>
  </div>

  <!-- Sort & count -->
  <div class="list-header">
    <div class="list-count" id="list-count">Loading...</div>
    <div class="sort-wrap">
      <span class="sort-label">Sort:</span>
      <select class="sort-select" id="sort-select" onchange="handleSort(this.value)">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="category">Category</option>
      </select>
    </div>
  </div>

  <!-- News grid -->
  <div class="news-grid" id="news-grid">
    <!-- Skeletons -->
    <div class="news-card" style="pointer-events:none">
      <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>
      <div class="card-body"><div style="height:12px;background:#f0f0f0;border-radius:4px;width:40%;margin-bottom:8px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:100%;margin-bottom:6px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:80%"></div></div>
    </div>
    <div class="news-card" style="pointer-events:none">
      <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>
      <div class="card-body"><div style="height:12px;background:#f0f0f0;border-radius:4px;width:50%;margin-bottom:8px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:100%;margin-bottom:6px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:60%"></div></div>
    </div>
    <div class="news-card" style="pointer-events:none">
      <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>
      <div class="card-body"><div style="height:12px;background:#f0f0f0;border-radius:4px;width:35%;margin-bottom:8px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:100%;margin-bottom:6px"></div><div style="height:14px;background:#f0f0f0;border-radius:4px;width:70%"></div></div>
    </div>
  </div>

  <!-- Load more -->
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">
      <i class="fas fa-plus"></i> Load More
    </button>
  </div>

</div>

<!-- ARTICLE VIEW -->
<div id="article-view">
  <div class="art-header">
    <button class="art-back" onclick="closeArticle()"><i class="fas fa-arrow-left"></i></button>
    <span class="art-header-cat" id="art-hdr-cat"></span>
    <div class="art-header-actions">
      <button class="art-icon-btn" id="art-speak-btn" onclick="speakArticle()" title="Listen"><i class="fas fa-volume-up"></i></button>
      <button class="art-icon-btn" id="art-save-btn" onclick="toggleSaveArticle()" title="Save"><i class="far fa-bookmark"></i></button>
      <button class="art-icon-btn" onclick="toggleArtShare()" title="Share"><i class="fas fa-share-alt"></i></button>
    </div>
  </div>
  <div class="art-progress"><div class="art-progress-fill" id="art-progress"></div></div>

  <div class="art-content">
    <div class="art-hero" id="art-hero">
      <div class="art-hero-fb" id="art-fb"><img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NewsTally"></div>
    </div>
    <div class="art-body">
      <div class="art-meta-row">
        <span class="art-cat-badge" id="art-cat-badge">News</span>
        <span class="art-rt"><i class="far fa-clock" style="font-size:11px"></i><span id="art-rt-text">2 min read</span></span>
      </div>
      <h1 class="art-title" id="art-title-el"></h1>
      <div class="art-src-bar">
        <div>
          <div class="art-src-name" id="art-src-el"></div>
          <div class="art-src-date" id="art-date-el"></div>
        </div>
        <div class="art-btns">
          <button class="art-btn" id="art-save-bar-btn" onclick="toggleSaveArticle()"><i class="far fa-bookmark"></i> Save</button>
          <button class="art-btn" onclick="toggleArtShare()"><i class="fas fa-share-alt"></i> Share</button>
        </div>
      </div>
      <div class="art-text" id="art-text-el"></div>
      <div class="art-share-row" id="art-share-row" style="display:none">
        <button class="sh-btn sh-wa" onclick="shareWA()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        <button class="sh-btn sh-tw" onclick="shareTW()"><i class="fab fa-x-twitter"></i> X</button>
        <button class="sh-btn sh-tg" onclick="shareTG()"><i class="fab fa-telegram"></i> Telegram</button>
        <button class="sh-btn sh-cp" onclick="shareCopy()"><i class="fas fa-link"></i> Copy Link</button>
      </div>
      <div class="art-tags" id="art-tags-el"></div>
    </div>
    <div class="related-wrap" id="related-wrap" style="display:none">
      <div class="related-title">More like this</div>
      <div id="related-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE + APP SCRIPT -->
<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
import { getFirestore, collection, query, orderBy, limit, getDocs, startAfter }
  from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

// ===== CONFIG =====
const firebaseConfig = {
  apiKey:            'AIzaSyA4zw5cZqxLwzkTy2e5NiHz-tGKqk1KGdI',
  authDomain:        'newstally-df03c.firebaseapp.com',
  projectId:         'newstally-df03c',
  storageBucket:     'newstally-df03c.appspot.com',
  messagingSenderId: '506893212961',
  appId:             '1:506893212961:web:63882290195da992207260'
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ===== STATE =====
let allNews       = [];
let filteredNews  = [];
let displayedCount = 0;
const PAGE_SIZE   = 12;
let lastDoc       = null;
let currentCat    = 'All';
let currentSort   = 'newest';
let currentSearch = '';
let currentArt    = null;
let savedIds      = JSON.parse(localStorage.getItem('nt_test_saved') || '[]');
let speaking      = false;

// ===== UTILS =====
window.toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
};

function hideLd() {
  const s = document.getElementById('loading');
  s.classList.add('hide');
  setTimeout(() => s.style.display = 'none', 450);
}

function setLdMsg(m) { document.getElementById('ld-msg').textContent = m; }

function fmtDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    const now  = new Date();
    const diff = Math.floor((now - dt) / 1000);
    if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800)return Math.floor(diff/86400) + 'd ago';
    return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  } catch { return d; }
}

function readMins(t, d) {
  return Math.max(1, Math.ceil(((t||'').length + (d||'').length) / 200));
}

function artShareUrl(a) {
  return `https://newstally.online/newstally?nid=${encodeURIComponent(a.id)}&q=${encodeURIComponent(a.title)}&cat=${encodeURIComponent(a.category)}&src=${encodeURIComponent(a.source)}`;
}

// ===== FETCH FROM FIREBASE =====
async function fetchFromFirebase() {
  setLdMsg('Fetching from Firebase...');
  
  // Try with orderBy first
  try {
    const q = query(
      collection(db, 'news'),
      orderBy('savedAt', 'desc'),
      limit(200)
    );
    const snap = await getDocs(q);
    if (snap.docs.length > 0) {
      lastDoc = snap.docs[snap.docs.length - 1];
      return snap.docs.map(d => d.data());
    }
  } catch(e) {
    console.warn('Ordered query failed, trying without orderBy:', e.message);
  }

  // Fallback: no orderBy (works without index)
  try {
    const q2 = query(collection(db, 'news'), limit(200));
    const snap2 = await getDocs(q2);
    const data = snap2.docs.map(d => d.data());
    // Sort client-side
    data.sort((a, b) => new Date(b.savedAt||b.date||0) - new Date(a.savedAt||a.date||0));
    return data;
  } catch(e2) {
    throw new Error('Firestore fetch failed: ' + e2.message);
  }
}

// ===== BUILD CATEGORY FILTERS =====
function buildCategories(news) {
  const cats = ['All', ...new Set(news.map(n => n.category).filter(Boolean).sort())];
  const wrap = document.getElementById('filter-wrap');
  wrap.innerHTML = cats.map((c, i) =>
    `<button class="cat-btn${i===0?' active':''}" onclick="filterCat('${c}',this)">${c}</button>`
  ).join('');
}

// ===== APPLY FILTER + SORT + SEARCH =====
function applyFilters() {
  let result = [...allNews];

  // Search
  if (currentSearch) {
    const s = currentSearch.toLowerCase();
    result = result.filter(n =>
      (n.title||'').toLowerCase().includes(s) ||
      (n.description||'').toLowerCase().includes(s) ||
      (n.source||'').toLowerCase().includes(s) ||
      (n.category||'').toLowerCase().includes(s)
    );
  }

  // Category
  if (currentCat !== 'All') {
    result = result.filter(n => n.category === currentCat);
  }

  // Sort
  if (currentSort === 'newest') {
    result.sort((a,b) => new Date(b.savedAt||b.date) - new Date(a.savedAt||a.date));
  } else if (currentSort === 'oldest') {
    result.sort((a,b) => new Date(a.savedAt||a.date) - new Date(b.savedAt||b.date));
  } else if (currentSort === 'category') {
    result.sort((a,b) => (a.category||'').localeCompare(b.category||''));
  }

  filteredNews  = result;
  displayedCount = 0;
  renderGrid(true);
}

// ===== RENDER GRID =====
function renderGrid(reset = false) {
  const grid = document.getElementById('news-grid');
  if (reset) grid.innerHTML = '';

  if (filteredNews.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-newspaper"></i>
      <p>No articles found</p>
      <small>${currentSearch ? 'Try different search terms' : 'No news in this category'}</small>
    </div>`;
    document.getElementById('load-more-wrap').style.display = 'none';
    document.getElementById('list-count').textContent = '0 articles';
    return;
  }

  const batch = filteredNews.slice(displayedCount, displayedCount + PAGE_SIZE);
  batch.forEach(n => {
    const card = createCard(n);
    grid.appendChild(card);
  });
  displayedCount += batch.length;

  // Load more
  const lmWrap = document.getElementById('load-more-wrap');
  lmWrap.style.display = displayedCount < filteredNews.length ? 'block' : 'none';

  // Count
  document.getElementById('list-count').textContent =
    `${filteredNews.length} article${filteredNews.length !== 1 ? 's' : ''}${currentCat !== 'All' ? ' in ' + currentCat : ''}${currentSearch ? ' matching "'+currentSearch+'"' : ''}`;
}

// ===== CREATE CARD =====
function createCard(n) {
  const card = document.createElement('article');
  card.className = 'news-card';
  card.setAttribute('data-id', n.id);
  const isSaved = savedIds.includes(n.id);

  card.innerHTML = `
    ${n.image
      ? `<img class="card-img" src="${n.image}" alt="${(n.title||'').substring(0,50)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : ''}
    <div class="card-img-placeholder" style="${n.image?'display:none':''}">
      <img src="https://i.postimg.cc/dLTgRxbL/cropped-circle-image.png" alt="NT">
    </div>
    <div class="card-body">
      <div class="card-cat">${n.category||'News'}</div>
      <div class="card-title">${n.title||''}</div>
      ${n.description ? `<div class="card-desc">${n.description}</div>` : ''}
      <div class="card-meta">
        <span class="card-source">${n.source||''}</span>
        <span class="card-date">${fmtDate(n.date||n.savedAt)}</span>
      </div>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="card-act${isSaved?' saved':''}" id="save-card-${n.id}" onclick="toggleSaveCard('${n.id}',this)" title="Save">
        <i class="${isSaved?'fas':'far'} fa-bookmark"></i> ${isSaved?'Saved':'Save'}
      </button>
      <button class="card-act" onclick="quickShare('${n.id}')" title="Share">
        <i class="fas fa-share-alt"></i> Share
      </button>
    </div>`;

  card.onclick = () => openArticle(n);
  return card;
}

// ===== OPEN ARTICLE =====
function openArticle(n) {
  currentArt = n;
  const view = document.getElementById('article-view');
  view.style.display = 'block';
  view.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Update URL
  window.history.pushState({ art: n.id }, '', `/test.html?nid=${encodeURIComponent(n.id)}`);
  document.title = n.title + ' — NewsTally';

  // Progress bar
  view.onscroll = () => {
    const pct = (view.scrollTop / (view.scrollHeight - view.clientHeight)) * 100;
    document.getElementById('art-progress').style.width = pct + '%';
  };

  // Header
  document.getElementById('art-hdr-cat').textContent = n.category || '';

  // Hero
  const hero = document.getElementById('art-hero');
  hero.querySelectorAll('img:not(.art-hero-fb img)').forEach(i => i.remove());
  document.getElementById('art-fb').style.display = 'flex';
  if (n.image) {
    const img = document.createElement('img');
    img.src = n.image; img.alt = n.title || '';
    img.onload  = () => document.getElementById('art-fb').style.display = 'none';
    img.onerror = () => img.remove();
    hero.insertBefore(img, document.getElementById('art-fb'));
  }

  // Fields
  document.getElementById('art-cat-badge').textContent  = n.category || 'News';
  document.getElementById('art-rt-text').textContent    = readMins(n.title, n.description) + ' min read';
  document.getElementById('art-title-el').textContent   = n.title || '';
  document.getElementById('art-src-el').textContent     = n.source || 'NewsTally';
  document.getElementById('art-date-el').textContent    = fmtDate(n.date || n.savedAt);

  // Text
  const textEl = document.getElementById('art-text-el');
  textEl.innerHTML = '';
  document.querySelector('.art-nc')?.remove();
  if (n.description) {
    const sents = n.description.split(/(?<=[.!?])\s+/).filter(s => s.trim());
    textEl.innerHTML = sents.length > 1
      ? sents.map(s => `<p>${s.trim()}</p>`).join('')
      : `<p>${n.description}</p>`;
    textEl.style.display = '';
  } else {
    textEl.style.display = 'none';
    const nc = document.createElement('div');
    nc.className = 'art-nc';
    nc.innerHTML = `<i class="fas fa-newspaper"></i>
      <p>Full article not available in feed.${n.url ? ` <a href="${n.url}" target="_blank" rel="noopener" style="color:#1a73e8;font-weight:600">Read on ${n.source||'source'} →</a>` : ''}</p>`;
    textEl.parentNode.insertBefore(nc, textEl.nextSibling);
  }

  // Tags
  const tagsEl = document.getElementById('art-tags-el');
  tagsEl.innerHTML = n.category
    ? `<span class="art-tag" onclick="filterCat('${n.category}',null);closeArticle()">#${n.category}</span>
       ${n.source ? `<span class="art-tag" style="background:#e6f4ea;color:#1e7e34">${n.source}</span>` : ''}`
    : '';

  // Save btn state
  updateArtSaveBtn();

  // Share row hidden
  document.getElementById('art-share-row').style.display = 'none';

  // Related
  loadRelated(n);
}

// ===== CLOSE ARTICLE =====
window.closeArticle = () => {
  const view = document.getElementById('article-view');
  view.style.display = 'none';
  document.body.style.overflow = '';
  window.history.replaceState({}, '', '/test.html');
  document.title = 'NewsTally — Firebase Test';
  // Stop TTS
  if (speaking) { window.speechSynthesis?.cancel(); speaking = false; updateSpeakBtn(); }
};

window.backToFeed = () => {
  if (document.getElementById('article-view').style.display === 'block') closeArticle();
};

// ===== LOAD RELATED =====
function loadRelated(n) {
  const same   = allNews.filter(a => a.id !== n.id && a.category === n.category).slice(0, 4);
  const others = allNews.filter(a => a.id !== n.id && a.category !== n.category).slice(0, 2);
  const rel    = [...same, ...others].slice(0, 5);
  const wrap   = document.getElementById('related-wrap');
  const list   = document.getElementById('related-list');
  if (!rel.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = rel.map(r => `
    <div class="rel-card" data-id="${r.id}">
      <img src="${r.image||'https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'}" alt="${(r.title||'').substring(0,30)}" loading="lazy" onerror="this.src='https://placehold.co/80x60/e8f0fe/1a73e8?text=NT'">
      <div class="rel-body">
        <div class="rel-cat">${r.category}</div>
        <div class="rel-title">${r.title}</div>
        <div class="rel-src">${r.source} · ${fmtDate(r.date||r.savedAt)}</div>
      </div>
    </div>`).join('');
  list.querySelectorAll('.rel-card').forEach(card => {
    card.onclick = () => {
      const art = allNews.find(a => a.id === card.dataset.id);
      if (art) openArticle(art);
    };
  });
}

// ===== SAVE =====
function updateArtSaveBtn() {
  if (!currentArt) return;
  const saved = savedIds.includes(currentArt.id);
  ['art-save-btn','art-save-bar-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    if (id === 'art-save-btn') btn.innerHTML = `<i class="${saved?'fas':'far'} fa-bookmark"></i>`;
    else btn.innerHTML = `<i class="${saved?'fas':'far'} fa-bookmark"></i> ${saved?'Saved':'Save'}`;
    btn.className = btn.className.replace(' saved','') + (saved ? ' saved' : '');
  });
}

window.toggleSaveArticle = () => {
  if (!currentArt) return;
  const i = savedIds.indexOf(currentArt.id);
  if (i > -1) { savedIds.splice(i, 1); toast('Removed from saved'); }
  else { savedIds.unshift(currentArt.id); toast('🔖 Saved!'); }
  localStorage.setItem('nt_test_saved', JSON.stringify(savedIds));
  updateArtSaveBtn();
  // Update card
  const cardBtn = document.getElementById('save-card-' + currentArt.id);
  if (cardBtn) {
    const saved = savedIds.includes(currentArt.id);
    cardBtn.className = 'card-act' + (saved?' saved':'');
    cardBtn.innerHTML = `<i class="${saved?'fas':'far'} fa-bookmark"></i> ${saved?'Saved':'Save'}`;
  }
};

window.toggleSaveCard = (id, btn) => {
  const i = savedIds.indexOf(id);
  if (i > -1) { savedIds.splice(i, 1); toast('Removed'); }
  else { savedIds.unshift(id); toast('🔖 Saved!'); }
  localStorage.setItem('nt_test_saved', JSON.stringify(savedIds));
  const saved = savedIds.includes(id);
  btn.className = 'card-act' + (saved?' saved':'');
  btn.innerHTML = `<i class="${saved?'fas':'far'} fa-bookmark"></i> ${saved?'Saved':'Save'}`;
};

// ===== SHARE =====
window.toggleArtShare = () => {
  const r = document.getElementById('art-share-row');
  r.style.display = r.style.display === 'none' ? 'flex' : 'none';
  if (r.style.display === 'flex') r.scrollIntoView({behavior:'smooth', block:'nearest'});
};

window.shareWA = () => {
  if (!currentArt) return;
  const u = artShareUrl(currentArt), d = (currentArt.description||'').substring(0,120);
  window.open(`https://wa.me/?text=${encodeURIComponent(`📰 *${currentArt.title}*\n\n${d}...\n\n🔗 ${u}\n\n📲 *NewsTally*`)}`, '_blank');
};
window.shareTW = () => {
  if (!currentArt) return;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('📰 '+currentArt.title)}&url=${encodeURIComponent(artShareUrl(currentArt))}&via=newstallyofficial`, '_blank');
};
window.shareTG = () => {
  if (!currentArt) return;
  const u = artShareUrl(currentArt), d = (currentArt.description||'').substring(0,100);
  window.open(`https://t.me/share/url?url=${encodeURIComponent(u)}&text=${encodeURIComponent(`📰 ${currentArt.title}\n\n${d}...`)}`, '_blank');
};
window.shareCopy = () => {
  if (!currentArt) return;
  const u = artShareUrl(currentArt);
  navigator.clipboard?.writeText(u).then(() => toast('🔗 Link copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = u; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('🔗 Link copied!');
  });
};
window.quickShare = (id) => {
  const n = allNews.find(a => a.id === id);
  if (!n) return;
  const u = artShareUrl(n);
  if (navigator.share) { navigator.share({title: n.title, url: u}).catch(()=>{}); }
  else { navigator.clipboard?.writeText(u).then(() => toast('🔗 Link copied!')); }
};

// ===== TEXT TO SPEECH =====
function updateSpeakBtn() {
  const btn = document.getElementById('art-speak-btn');
  if (!btn) return;
  btn.innerHTML = speaking
    ? '<i class="fas fa-stop-circle" style="color:#ea4335"></i>'
    : '<i class="fas fa-volume-up"></i>';
}
window.speakArticle = () => {
  if (!currentArt) return;
  if (speaking) { window.speechSynthesis?.cancel(); speaking = false; updateSpeakBtn(); return; }
  const text = `${currentArt.title}. ${currentArt.description || ''}`;
  const utt  = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-IN'; utt.rate = 0.95;
  utt.onend = () => { speaking = false; updateSpeakBtn(); };
  window.speechSynthesis?.speak(utt);
  speaking = true; updateSpeakBtn();
};

// ===== FILTER =====
window.filterCat = (cat, btn) => {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    document.querySelectorAll('.cat-btn').forEach(b => {
      if (b.textContent.trim() === cat) b.classList.add('active');
    });
  }
  // Update stat
  document.getElementById('stat-cat').textContent = cat === 'All' ? 'All categories' : cat;
  applyFilters();
};

// ===== SEARCH =====
window.handleSearch = (val) => {
  currentSearch = val.trim();
  document.getElementById('clear-icon').style.display = val ? 'block' : 'none';
  document.getElementById('search-icon').style.display = val ? 'none' : 'block';
  applyFilters();
};
window.triggerSearch = () => {
  const inp = document.getElementById('search-input');
  handleSearch(inp.value);
};
window.clearSearch = () => {
  const inp = document.getElementById('search-input');
  inp.value = ''; currentSearch = '';
  document.getElementById('clear-icon').style.display = 'none';
  document.getElementById('search-icon').style.display = 'block';
  applyFilters();
  inp.focus();
};

// ===== SORT =====
window.handleSort = (val) => {
  currentSort = val;
  applyFilters();
};

// ===== LOAD MORE =====
window.loadMore = async () => {
  const btn = document.getElementById('load-more-btn');
  if (displayedCount >= filteredNews.length) {
    btn.style.display = 'none'; return;
  }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
  await new Promise(r => setTimeout(r, 300));
  renderGrid(false);
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-plus"></i> Load More';
};

// ===== DARK MODE =====
window.toggleDark = () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('nt_test_dark', isDark ? '1' : '0');
  document.getElementById('dark-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
};

// ===== BACK BUTTON =====
window.addEventListener('popstate', () => {
  if (document.getElementById('article-view').style.display === 'block') closeArticle();
});

// ===== INIT =====
(async () => {
  // Restore dark mode
  if (localStorage.getItem('nt_test_dark') === '1') {
    document.documentElement.classList.add('dark');
    document.getElementById('dark-icon').className = 'fas fa-sun';
  }

  try {
    setLdMsg('Connecting to Firebase...');
    allNews = await fetchFromFirebase();

    if (!allNews.length) {
      document.getElementById('news-grid').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-database"></i>
          <p>No news in Firebase yet</p>
          <small>Run syncGNewsToFirebase() in Apps Script first</small>
        </div>`;
      hideLd();
      return;
    }

    // Stats
    document.getElementById('stat-total').textContent = allNews.length;
    const latest = allNews[0];
    document.getElementById('stat-time').textContent = latest ? 'Last: ' + fmtDate(latest.savedAt) : 'Now';

    // Build categories
    buildCategories(allNews);

    // Initial render
    applyFilters();
    hideLd();

    // Check URL for direct article open
    const params = new URLSearchParams(window.location.search);
    const nid = params.get('nid');
    if (nid) {
      const art = allNews.find(n => n.id === nid);
      if (art) setTimeout(() => openArticle(art), 300);
    }

  } catch(e) {
    console.error('Firebase fetch failed:', e);
    document.getElementById('news-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Firebase connection failed</p>
        <small>${e.message}</small>
      </div>`;
    hideLd();
  }
})();
</script>
