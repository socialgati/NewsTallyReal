<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsTally - All Players</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js"></script>
  <style>
    /* Gradient background for top bar and footer */
    .gradient-bg {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
    }
    /* Hover animation for player cards */
    .player-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .player-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }
    /* Circular image styling */
    .player-image {
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
      transition: border-color 0.3s ease;
    }
    .player-image:hover {
      border-color: #1e3a8a;
    }
    /* Main content background */
    .content-bg {
      background: linear-gradient(180deg, #f3f4f6, #ffffff);
    }
    /* Filter dropdown styling */
    .filter-select {
      transition: border-color 0.3s ease;
    }
    .filter-select:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div id="root" class="min-h-screen flex flex-col">
    <!-- Top Bar -->
    <div class="gradient-bg text-white py-3">
      <div class="container mx-auto px-4 flex justify-between items-center">
        <div class="flex space-x-4">
          <a href="#" class="hover:text-gray-200 transition"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="hover:text-gray-200 transition"><i class="fab fa-twitter"></i></a>
          <a href="#" class="hover:text-gray-200 transition"><i class="fab fa-youtube"></i></a>
          <a href="#" class="hover:text-gray-200 transition"><i class="fab fa-instagram"></i></a>
        </div>
        <a href="index.html"><h1 class="text-2xl font-extrabold tracking-tight">NewsTally</h1></a>
        <div class="w-6"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10 flex-1 content-bg">
      <!-- Players Grid with Filters -->
      <div class="mb-6">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
          <h2 class="text-3xl font-bold text-gray-800">All Players</h2>
          <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
            <select id="category-filter" class="filter-select px-4 py-2 border rounded-full shadow-sm focus:ring-2 focus:ring-blue-500 w-full sm:w-48">
              <option value="">All Categories</option>
            </select>
            <select id="country-filter" class="filter-select px-4 py-2 border rounded-full shadow-sm focus:ring-2 focus:ring-blue-500 w-full sm:w-48">
              <option value="">All Countries</option>
            </select>
            <input
              id="player-search"
              type="text"
              placeholder="Search players..."
              class="px-4 py-2 border rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-1/3"
            />
          </div>
        </div>
        <div id="players-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="gradient-bg text-white py-10">
      <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <h3 class="text-xl font-bold mb-4">About NewsTally</h3>
          <p class="text-gray-200">Your one-stop destination for the latest news across all categories, powered by NewsTally.</p>
        </div>
        <div>
          <h3 class="text-xl font-bold mb-4">Quick Links</h3>
          <ul class="space-y-3">
            <li><a href="#" class="hover:underline text-gray-200 hover:text-white transition">Home</a></li>
            <li><a href="#" class="hover:underline text-gray-200 hover:text-white transition">About</a></li>
            <li><a href="#" class="hover:underline text-gray-200 hover:text-white transition">Contact</a></li>
          </ul>
        </div>
        <div>
          <h3 class="text-xl font-bold mb-4">Follow Us</h3>
          <div class="flex space-x-4">
            <a href="#" class="hover:text-blue-200 transition"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="hover:text-blue-200 transition"><i class="fab fa-twitter"></i></a>
            <a href="#" class="hover:text-blue-200 transition"><i class="fab fa-youtube"></i></a>
            <a href="#" class="hover:text-blue-200 transition"><i class="fab fa-instagram"></i></a>
          </div>
        </div>
      </div>
      <div class="text-center mt-8">
        <p class="text-gray-300">© 2025 NewsTally. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script>
    const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
    const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
    const SHEET_NAME = 'Sheet2';

    let allPlayers = [];
    let categories = new Set();
    let countries = new Set();

    // Fetch player data from Google Sheet
    async function fetchPlayers() {
      try {
        const response = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`
        );
        const data = await response.json();
        const rows = data.values;
        const headers = rows[0];
        allPlayers = rows.slice(1).map(row => ({
          rank: parseInt(row[0]) || 0,
          playerName: row[1],
          biography: row[2],
          image: row[3] || 'https://via.placeholder.com/150x150',
          category: row[4],
          country: row[5],
          status: row[6]
        }));

        // Populate filter dropdowns
        populateFilters();
        displayAllPlayers(allPlayers);
        setupPlayerSearch();
        setupFilters();
      } catch (error) {
        console.error('Error fetching player data:', error);
        document.getElementById('players-grid').innerHTML = '<p class="text-gray-600 text-center col-span-full">Failed to load players. Please check API key and sheet access.</p>';
      }
    }

    // Populate filter dropdowns with unique categories and countries
    function populateFilters() {
      allPlayers.forEach(player => {
        categories.add(player.category);
        countries.add(player.country);
      });

      const categoryFilter = document.getElementById('category-filter');
      const countryFilter = document.getElementById('country-filter');

      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });

      countries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countryFilter.appendChild(option);
      });
    }

    // Display all players in a grid
    function displayAllPlayers(players) {
      const grid = document.getElementById('players-grid');
      const playersHTML = players.length > 0
        ? players.map(item => `
            <div class="player-card text-center">
              <a href="playerbio.html?player=${encodeURIComponent(item.playerName)}">
                <img src="${item.image}" alt="${item.playerName}" class="player-image w-24 h-24 mx-auto mb-2">
              </a>
              <a href="playerbio.html?player=${encodeURIComponent(item.playerName)}" class="text-sm font-semibold text-gray-800 hover:text-blue-600 transition">
                ${item.playerName} <span class="text-xs text-gray-500">(${item.rank})</span>
              </a>
            </div>
          `).join('')
        : '<p class="text-gray-600 text-center col-span-full">No players available.</p>';

      grid.innerHTML = playersHTML;
    }

    // Setup search functionality for the players grid
    function setupPlayerSearch() {
      const searchInput = document.getElementById('player-search');
      searchInput.addEventListener('input', applyFilters);
    }

    // Setup filter functionality
    function setupFilters() {
      const categoryFilter = document.getElementById('category-filter');
      const countryFilter = document.getElementById('country-filter');

      categoryFilter.addEventListener('change', applyFilters);
      countryFilter.addEventListener('change', applyFilters);
    }

    // Apply combined filters (search, category, country)
    function applyFilters() {
      const searchQuery = document.getElementById('player-search').value.toLowerCase();
      const selectedCategory = document.getElementById('category-filter').value;
      const selectedCountry = document.getElementById('country-filter').value;

      const filteredPlayers = allPlayers.filter(player => {
        const matchesSearch =
          player.playerName.toLowerCase().includes(searchQuery) ||
          player.country.toLowerCase().includes(searchQuery) ||
          player.category.toLowerCase().includes(searchQuery);
        const matchesCategory = selectedCategory ? player.category === selectedCategory : true;
        const matchesCountry = selectedCountry ? player.country === selectedCountry : true;

        return matchesSearch && matchesCategory && matchesCountry;
      });

      displayAllPlayers(filteredPlayers);
    }

    // Fetch players on load
    fetchPlayers();
  </script>
</body>
</html>
