<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="meta-title">NewsTally - Read News</title>
<!-- SEO Meta Tags -->
<meta name="description" id="meta-desc" content="Read the latest news on NewsTally.">
<meta property="og:type" content="article">
<meta property="og:title" id="og-title" content="NewsTally">
<meta property="og:image" id="og-img" content="https://placehold.co/1200x630?text=NewsTally">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #1a1a1a; }
    .prose p { margin-bottom: 1.5rem; color: #374151; line-height: 1.8; font-size: 1.1rem; }
    .skeleton { background: #eee; background-image: linear-gradient(90deg, #eee 0, #f9f9f9 40px, #eee 80px); background-size: 600px; animation: shimmer 1.5s infinite linear; }
    @keyframes shimmer { 0% { background-position: -100px } 100% { background-position: 100px } }
</style>

</head>
<body class="bg-white">
<header class="fixed top-0 w-full z-50 h-14 bg-white/90 border-b backdrop-blur-md flex items-center justify-between px-4">
    <a href="index.html" class="flex items-center gap-2">
        <div class="bg-gradient-to-tr from-blue-600 to-purple-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">N</div>
        <span class="font-bold text-lg">NewsTally</span>
    </a>
    <div class="flex items-center gap-3">
        <button onclick="shareThis()" class="p-2 text-gray-500 hover:text-blue-600"><i class="fas fa-share-alt"></i></button>
        <a href="index.html" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full">Back Home</a>
    </div>
</header>

<main class="pt-20 pb-10 max-w-3xl mx-auto px-4">
    <!-- Error Message (Hidden by default) -->
    <div id="error-ui" class="hidden text-center py-20">
        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
        <h2 class="text-xl font-bold mb-2">Oops! News nahi mil rahi.</h2>
        <p id="error-msg" class="text-gray-500 mb-6 text-sm">Check your internet or API settings.</p>
        <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Home par jayein</a>
    </div>

    <!-- Skeleton Loader -->
    <div id="loader">
        <div class="h-4 w-20 skeleton rounded mb-4"></div>
        <div class="h-10 w-full skeleton rounded mb-6"></div>
        <div class="aspect-video w-full skeleton rounded-xl mb-6 shadow-sm"></div>
        <div class="space-y-4">
            <div class="h-4 w-full skeleton rounded"></div>
            <div class="h-4 w-full skeleton rounded"></div>
            <div class="h-4 w-2/3 skeleton rounded"></div>
        </div>
    </div>

    <!-- Article UI -->
    <article id="news-content" class="hidden opacity-0 transition-opacity duration-500">
        <span id="category" class="text-xs font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-1 rounded">Category</span>
        <h1 id="title" class="text-3xl md:text-5xl font-extrabold mt-4 mb-6 leading-tight text-gray-900">...</h1>
        
        <div class="flex items-center gap-3 mb-8 text-sm text-gray-500 border-t border-b py-4">
            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-400" id="source-icon">?</div>
            <div>
                <p id="source" class="font-bold text-gray-900">Source Name</p>
                <p id="date" class="text-xs">Date Published</p>
            </div>
        </div>

        <img id="main-image" src="" class="w-full rounded-2xl shadow-lg mb-10 object-cover max-h-[500px]" onerror="this.src='https://placehold.co/800x500?text=NewsTally'">

        <div id="body-text" class="prose max-w-none text-gray-800">
            <!-- Data from Sheets -->
        </div>

        <div class="mt-12 p-8 bg-blue-600 rounded-[2rem] text-white text-center shadow-xl">
            <h3 class="text-2xl font-bold mb-3">Yeh news repost karein!</h3>
            <p class="text-blue-100 mb-6">Community feed par doston ke saath share karein.</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="goToRepost()" class="bg-white text-blue-600 px-10 py-3 rounded-full font-bold hover:shadow-lg transform active:scale-95 transition">Repost Now</button>
            </div>
        </div>
    </article>
</main>

<script>
    // Bilkul vahi Credentials jo index.html mein kaam kar rahe hain
    const SHEET_ID = '1Wy6rzaCALqPLFx079nqBCDRP7dk3au5eRO4GuMwQ8Sk';
    const API_KEY = 'AIzaSyC8D-4bl3GDyj_--BGG1pPdO5Bz63r5iXI';
    let newsItem = null;

    async function fetchArticle() {
        const params = new URLSearchParams(window.location.search);
        const targetHeadline = params.get('headline');

        if (!targetHeadline) {
            window.location.href = 'index.html';
            return;
        }

        try {
            // Fetching the whole sheet like index.html does
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            if (!data.values) {
                throw new Error("Data values not found in Sheet.");
            }

            const items = data.values.slice(1).map(r => ({
                headline: r[1],
                source: r[2],
                date: r[3],
                desc: r[4],
                category: r[6] || 'General',
                image: r[7] && r[7].startsWith('http') ? r[7] : `https://placehold.co/600x400?text=News`
            }));

            const decodedHeadline = decodeURIComponent(targetHeadline).trim();
            
            // Flexible matching (Exact or partial)
            newsItem = items.find(n => n.headline && n.headline.trim() === decodedHeadline);

            if (newsItem) {
                renderArticle(newsItem);
            } else {
                showError("News item not found in our database.");
            }

        } catch (err) {
            console.error("Fetch Error:", err);
            showError("API Error: " + err.message);
        }
    }

    function renderArticle(n) {
        document.getElementById('loader').classList.add('hidden');
        const content = document.getElementById('news-content');
        
        document.title = n.headline + " | NewsTally";
        document.getElementById('title').innerText = n.headline;
        document.getElementById('category').innerText = n.category;
        document.getElementById('source').innerText = n.source;
        document.getElementById('date').innerText = n.date;
        document.getElementById('main-image').src = n.image;
        document.getElementById('source-icon').innerText = n.source.charAt(0);
        
        // SEO Meta updates
        document.getElementById('og-title').content = n.headline;
        document.getElementById('og-img').content = n.image;

        const paragraphs = n.desc.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
        document.getElementById('body-text').innerHTML = paragraphs;

        content.classList.remove('hidden');
        setTimeout(() => content.style.opacity = "1", 50);
    }

    function showError(msg) {
        document.getElementById('loader').classList.add('hidden');
        const ui = document.getElementById('error-ui');
        document.getElementById('error-msg').innerText = msg;
        ui.classList.remove('hidden');
    }

    function goToRepost() {
        if (newsItem) {
            window.location.href = `index.html?action=repost&headline=${encodeURIComponent(newsItem.headline)}`;
        }
    }

    function shareThis() {
        if (navigator.share) {
            navigator.share({ title: document.title, url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied!");
        }
    }

    window.onload = fetchArticle;
</script>

</body>
</html>
